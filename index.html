<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARDRIFTER - Alpha 1</title>
    <style>
        /* CSSリセットとベース設定 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; color: #fff; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }

        /* UIレイヤー (キャンバスの上にかぶせる) */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* HUD (ヘッドアップディスプレイ) */
        #hud { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; text-shadow: 1px 1px 2px #000; }
        #hud div { margin-bottom: 5px; }
        
        /* レベルアップ画面 (三者択一UI) */
        #level-up-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.9); border: 2px solid #0ff; padding: 30px;
            border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            display: none; flex-direction: column; align-items: center; pointer-events: auto;
        }
        #level-up-screen h2 { margin-top: 0; color: #0ff; text-transform: uppercase; letter-spacing: 2px; }
        .upgrade-options { display: flex; gap: 20px; margin-top: 20px; }
        .upgrade-card {
            border: 1px solid #44f; padding: 20px; cursor: pointer; width: 200px;
            text-align: center; background: rgba(20, 20, 50, 0.8); border-radius: 8px;
            transition: all 0.2s ease;
        }
        .upgrade-card:hover { background: rgba(50, 50, 100, 0.9); transform: scale(1.05); border-color: #0ff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
        .upgrade-card h3 { margin: 0 0 10px 0; color: #fff; }
        .upgrade-card p { margin: 0; color: #aaa; font-size: 0.9rem; }

        /* ゲームオーバー画面 */
        #game-over-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; pointer-events: auto;
            background: rgba(30, 0, 0, 0.9); padding: 50px; border: 2px solid #f00; border-radius: 10px;
        }
        #game-over-screen h1 { color: #f00; font-size: 3rem; margin-top: 0; }
        button { 
            padding: 10px 30px; font-size: 1.2rem; cursor: pointer; background: #222; color: #fff; 
            border: 1px solid #f00; border-radius: 5px; font-family: inherit; transition: 0.2s;
        }
        button:hover { background: #f00; color: #000; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="ui-layer">
    <div id="hud">
        <div>LEVEL: <span id="ui-level">1</span></div>
        <div>EXP: <span id="ui-exp">0</span> / <span id="ui-next-exp">100</span></div>
        <div>HP: <span id="ui-hp">100</span></div>
    </div>

    <div id="level-up-screen">
        <h2>LEVEL UP!</h2>
        <div class="upgrade-options" id="upgrade-options"></div>
    </div>

    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">RESTART SYSTEM</button>
    </div>
</div>

<script>
/**
 * VANGUARDRIFTER - Alpha 1 Implementation
 */

// ==========================================
// 0. ゲーム調整用パラメータ設定 (CONFIG)
// ==========================================
const CONFIG = {
    // 【物理・自機基本設定】
    FRICTION: 0.98,               // 宇宙空間の摩擦係数（慣性のすべり具合。1.0で完全無摩擦）
    PLAYER_BASE_MOVE_SPEED: 0.8,    // 自機の初期移動力（W/A/S/Dキー押し込み時の加速度）
    PLAYER_BASE_MAX_SPEED: 8.0,     // 自機の初期最高速度
    PLAYER_BASE_HP: 100,          // 自機の初期HP
    PLAYER_SIZE_W: 30,            // 自機のグラフィック幅（ピクセル）
    PLAYER_SIZE_H: 36,            // 自機のグラフィック高（ピクセル）

    // 【射撃・弾設定】
    BULLET_BASE_FIRE_RATE: 20,    // 射撃の初期連射速度（フレーム間隔。低いほど高速連射）
    BULLET_SPEED: 15,             // ショットの飛翔弾速
    BULLET_DAMAGE: 10,            // ショット1発あたりの敵へのダメージ
    BULLET_LIFE: 100,             // ショットの生存寿命（フレーム数。射程距離に影響）
    BULLET_SIZE: 4,               // ショットの半径（ピクセル）
    BULLET_SPREAD_ANGLE: 0.15,    // 複数弾発射（マルチショット）時の1弾あたりの拡散角度（ラジアン）
    AUTO_AIM_RADIUS: 600,         // 自動エイムが敵を捕捉する最大半径（ピクセル）

    // 【ヒートゲージ設定】
    HEAT_MAX: 100,                // ヒートゲージの最大容量
    HEAT_PER_SHOT: 8,             // 1発射撃ごとの熱上昇量
    HEAT_COOL_RATE: 0.8,          // 射撃していない時の毎フレームの冷却量
    HEAT_OVERHEAT_PENALTY: 180,   // オーバーヒート時の冷却完了までのペナルティ時間（フレーム数。約3秒）

    // 【敵機設定】
    ENEMY_SIZE_W: 30,             // 敵機のグラフィック幅
    ENEMY_SIZE_H: 36,             // 敵機のグラフィック高
    ENEMY_SPEED: 3.0,             // 敵機の基本追尾速度
    ENEMY_BASE_HP: 20,            // 敵機の初期HP（レベル1時点）
    ENEMY_HP_LEVEL_MULT: 5,       // プレイヤーのレベル上昇に伴う敵HPの増加量（レベルごとに加算）
    ENEMY_SPAWN_BASE_RATE: 0.04,  // 敵機の基本スポーン率（毎フレームごとの出現判定確率）
    ENEMY_SPAWN_LEVEL_MULT: 0.005, // プレイヤーレベル上昇時の敵機スポーン増加係数
    ENEMY_DAMAGE: 15,             // 敵機に衝突した際に自機が受けるダメージ量

    // 【経験値ジェム・成長システム設定】
    GEM_SIZE: 12,                 // 経験値ジェムのサイズ
    GEM_BASE_EXP: 20,             // ジェム1個あたりから獲得できる基本経験値量
    GEM_MAGNET_RADIUS: 150,       // 経験値ジェムを引き寄せる磁石（吸引）の半径（ピクセル）
    GEM_MAGNET_BASE_SPEED: 8.0,   // ジェムがプレイヤーに吸引される時の初速
    GEM_MAGNET_ACCEL: 0.5,        // ジェムの毎フレームの吸引加速度（逃さず必ず回収するため）
    GEM_COLLECT_RADIUS: 20,       // ジェムを回収・獲得する自機との判定半径（ピクセル）
    LEVEL_UP_EXP_BASE: 100,       // レベル2に上がるために必要な基本経験値量
    LEVEL_UP_EXP_MULT: 1.3,       // レベルアップ毎の必要経験値の倍率上昇係数

    // 【アップグレード効果設定】
    UPGRADE_FIRERATE_MULT: 0.8,   // 「Rapid Fire」取得時の連射間隔短縮率（例: 0.8 = 連射速度20%アップ）
    UPGRADE_FIRERATE_MIN: 5,      // 連射速度の限界最小フレーム間隔（これ以上速くならないようにクランプ）
    UPGRADE_MOVESPEED_ADD: 0.2,   // 「Engine Boost」取得時の加速度加算値
    UPGRADE_MAXSPEED_ADD: 2.0,    // 「Engine Boost」取得時の最高速度加算値
    UPGRADE_HEAL_AMOUNT: 50,      // 「Hull Repair」取得時のHP回復量

    // 【当たり判定半径設定】
    COLLISION_ENEMY_BULLET: 20,   // 敵機とプレイヤーの弾が当たったと判定する円半径（ピクセル）
    COLLISION_ENEMY_PLAYER: 20,   // 敵機とプレイヤー自身が接触したと判定する円半径（ピクセル）

    // 【エフェクト・演出設定】
    FLASH_DURATION: 8,            // 被弾時の画面フラッシュ・敵の白フラッシュ時間（フレーム数）
    DEBRIS_SPEED_MULT: 5.0,       // 破片の飛び散る初速の最大値
    DEBRIS_LIFE: 30,              // 破片の生存フレーム数
    STAR_LAYERS: [
        { rate: 0.2, size: 1, count: 150 }, // 遠景レイヤー（スクロール率、星の描画サイズ、描画個数）
        { rate: 0.5, size: 2, count: 100 }, // 中景レイヤー
        { rate: 0.8, size: 3, count: 50 }   // 近景レイヤー
    ],
    PARTICLE_SIZE: 6,             // スラスターから出るパーティクルの初期サイズ（半径）
    PARTICLE_DECAY: 0.04,         // パーティクルの毎フレームのフェードアウト（縮小）速度
    PARTICLE_VEL_MULT: 0.5,       // パーティクル生成時にプレイヤーの慣性速度を引き継ぐ割合（0.5 = 50%）
};

// ==========================================
// 1. Phase 1: 描画基盤 (SpriteCache)
// ==========================================
const SpriteCache = {
    player: null,
    enemy: null,
    enemyFlash: null,
    bullet: null,
    particle: null,
    gem: null,

    init: function() {
        this.player = this.createShip('#0f0', CONFIG.PLAYER_SIZE_W, CONFIG.PLAYER_SIZE_H);  // 緑の自機
        this.enemy = this.createShip('#f00', CONFIG.ENEMY_SIZE_W, CONFIG.ENEMY_SIZE_H);   // 赤の敵機
        this.enemyFlash = this.createShip('#fff', CONFIG.ENEMY_SIZE_W, CONFIG.ENEMY_SIZE_H, true); // 白のフラッシュ用敵機
        this.bullet = this.createCircle('#ff0', CONFIG.BULLET_SIZE);     // 黄色のショット
        this.particle = this.createCircle('#f80', CONFIG.PARTICLE_SIZE);   // オレンジのパーティクル
        this.gem = this.createDiamond('#0ff', CONFIG.GEM_SIZE);      // シアンの経験値ジェム
    },

    createShip: function(color, w, h, isFlash=false) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        // ▲ 二等辺三角形の描画 (進行方向は右: x=w 側)
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(w, h / 2);      // 先端
        ctx.lineTo(0, 0);          // 左上
        ctx.lineTo(0, h);          // 左下
        ctx.closePath();
        ctx.fill();
        // ● キャノピー (進行方向付近の黒い円)
        if (!isFlash) {
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(w - 10, h / 2, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        return c;
    },

    createCircle: function(color, r) {
        const c = document.createElement('canvas');
        c.width = r * 2; c.height = r * 2;
        const ctx = c.getContext('2d');
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(r, r, r, 0, Math.PI * 2);
        ctx.fill();
        return c;
    },

    createDiamond: function(color, size) {
        const c = document.createElement('canvas');
        c.width = size; c.height = size;
        const ctx = c.getContext('2d');
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(size / 2, 0);
        ctx.lineTo(size, size / 2);
        ctx.lineTo(size / 2, size);
        ctx.lineTo(0, size / 2);
        ctx.closePath();
        ctx.fill();
        return c;
    }
};

// ==========================================
// 2. ゲーム状態・エンティティ定義
// ==========================================
const GAME = {
    state: 'PLAYING', // PLAYING, PAUSED, GAMEOVER
    width: window.innerWidth,
    height: window.innerHeight,
    damageFlashTimer: 0 // 画面の赤フラッシュ用タイマー
};

const keys = {};
const mouse = { x: GAME.width / 2, y: GAME.height / 2, isDown: false };

// 入力イベント
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => mouse.isDown = true);
window.addEventListener('mouseup', e => mouse.isDown = false);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    GAME.width = canvas.width;
    GAME.height = canvas.height;
});

// Phase 5: 成長システムのデータ構造
const playerStats = {
    level: 1,
    exp: 0,
    nextLevelExp: CONFIG.LEVEL_UP_EXP_BASE,
    fireRate: CONFIG.BULLET_BASE_FIRE_RATE,   // 連射速度（フレーム間隔）
    bulletCount: 1, // 同時発射数
    moveSpeed: CONFIG.PLAYER_BASE_MOVE_SPEED, // 加速度係数
    maxSpeed: CONFIG.PLAYER_BASE_MAX_SPEED,
    hp: CONFIG.PLAYER_BASE_HP,
    maxHp: CONFIG.PLAYER_BASE_HP,
    heat: 0 // 現在の熱量
};

const upgradePool = [
    { 
        id: 'fireRate', 
        name: 'Rapid Fire', 
        description: '連射速度がアップする', 
        apply: () => playerStats.fireRate = Math.max(CONFIG.UPGRADE_FIRERATE_MIN, Math.floor(playerStats.fireRate * CONFIG.UPGRADE_FIRERATE_MULT)) 
    },
    { 
        id: 'bulletCount', 
        name: 'Multi-Shot', 
        description: '同時発射弾数が増える', 
        apply: () => playerStats.bulletCount++ 
    },
    { 
        id: 'moveSpeed', 
        name: 'Engine Boost', 
        description: '機動力・最高速度がアップ', 
        apply: () => { 
            playerStats.moveSpeed += CONFIG.UPGRADE_MOVESPEED_ADD; 
            playerStats.maxSpeed += CONFIG.UPGRADE_MAXSPEED_ADD; 
        } 
    },
    { 
        id: 'heal', 
        name: 'Hull Repair', 
        description: `HPを${CONFIG.UPGRADE_HEAL_AMOUNT}回復する`, 
        apply: () => playerStats.hp = Math.min(playerStats.maxHp, playerStats.hp + CONFIG.UPGRADE_HEAL_AMOUNT) 
    }
];

const player = {
    x: 0, y: 0, vx: 0, vy: 0, angle: 0, fireTimer: 0,
    isOverheated: false,
    overheatTimer: 0
};

const entities = {
    bullets: [], enemies: [], particles: [], gems: [], debris: []
};

// Phase 3: 多重スクロール星背景 (Parallax Starfield)
const stars = [];
CONFIG.STAR_LAYERS.forEach(layer => {
    for(let i = 0; i < layer.count; i++) {
        stars.push({ x: Math.random() * GAME.width, y: Math.random() * GAME.height, layer: layer });
    }
});

// パーティクル（破片）生成関数
function spawnDebris(x, y, color, count, size) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * CONFIG.DEBRIS_SPEED_MULT + 1.0;
        entities.debris.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color: color,
            size: size,
            life: 1.0 // 1.0 to 0.0
        });
    }
}

// ==========================================
// 3. ゲームループとロジック
// ==========================================
function update() {
    if (GAME.state !== 'PLAYING') return;

    // --- Phase 2: 物理と操作 (Drift Physics) ---
    let ax = 0, ay = 0;
    if (keys['KeyW'] || keys['ArrowUp']) ay -= playerStats.moveSpeed;
    if (keys['KeyS'] || keys['ArrowDown']) ay += playerStats.moveSpeed;
    if (keys['KeyA'] || keys['ArrowLeft']) ax -= playerStats.moveSpeed;
    if (keys['KeyD'] || keys['ArrowRight']) ax += playerStats.moveSpeed;

    player.vx += ax;
    player.vy += ay;
    
    // Friction (摩擦係数)
    player.vx *= CONFIG.FRICTION;
    player.vy *= CONFIG.FRICTION;
    
    // Math.hypot を用いた速度クランプ
    const speed = Math.hypot(player.vx, player.vy);
    if (speed > playerStats.maxSpeed) {
        player.vx = (player.vx / speed) * playerStats.maxSpeed;
        player.vy = (player.vy / speed) * playerStats.maxSpeed;
    }

    player.x += player.vx;
    player.y += player.vy;

    // 最も近い敵を探索（自動エイム用）
    let nearestEnemy = null;
    let minDist = Infinity;
    for (let e of entities.enemies) {
        let d = Math.hypot(e.x - player.x, e.y - player.y);
        if (d < minDist) {
            minDist = d;
            nearestEnemy = e;
        }
    }

    // 機体の回転 (敵がいれば敵の方向へ、いなければ進行方向やマウス方向へ)
    if (nearestEnemy && minDist <= CONFIG.AUTO_AIM_RADIUS) {
        player.angle = Math.atan2(nearestEnemy.y - player.y, nearestEnemy.x - player.x);
    } else {
        const dx = mouse.x - GAME.width / 2;
        const dy = mouse.y - GAME.height / 2;
        player.angle = Math.atan2(dy, dx);
    }

    // --- Phase 3: スラスターパーティクル (慣性の継承と減衰) ---
    if (ax !== 0 || ay !== 0) {
        const emitX = player.x - Math.cos(player.angle) * (CONFIG.PLAYER_SIZE_W / 2);
        const emitY = player.y - Math.sin(player.angle) * (CONFIG.PLAYER_SIZE_W / 2);
        entities.particles.push({
            x: emitX, y: emitY,
            vx: player.vx * CONFIG.PARTICLE_VEL_MULT + (Math.random() - 0.5) * 2,
            vy: player.vy * CONFIG.PARTICLE_VEL_MULT + (Math.random() - 0.5) * 2,
            life: 1.0
        });
    }

    // --- ヒートゲージ＆自動エイム射撃ロジック ---
    // ヒート管理のため、射撃は「左クリック or スペースキー」を押している間のみ作動
    const isFiringInput = keys['Space'] || mouse.isDown;

    if (player.isOverheated) {
        player.overheatTimer--;
        playerStats.heat -= (CONFIG.HEAT_MAX / CONFIG.HEAT_OVERHEAT_PENALTY); // ペナルティ時間で0まで冷却
        if (player.overheatTimer <= 0) {
            playerStats.heat = 0;
            player.isOverheated = false;
        }
    } else {
        if (!isFiringInput) {
            // 射撃していない時は自然冷却
            playerStats.heat = Math.max(0, playerStats.heat - CONFIG.HEAT_COOL_RATE);
        }
    }

    if (isFiringInput && !player.isOverheated && nearestEnemy && minDist <= CONFIG.AUTO_AIM_RADIUS) {
        player.fireTimer++;
        if (player.fireTimer >= playerStats.fireRate) {
            player.fireTimer = 0;
            playerStats.heat += CONFIG.HEAT_PER_SHOT;

            if (playerStats.heat >= CONFIG.HEAT_MAX) {
                playerStats.heat = CONFIG.HEAT_MAX;
                player.isOverheated = true;
                player.overheatTimer = CONFIG.HEAT_OVERHEAT_PENALTY;
            }

            for (let i = 0; i < playerStats.bulletCount; i++) {
                const spread = (i - (playerStats.bulletCount - 1) / 2) * CONFIG.BULLET_SPREAD_ANGLE;
                entities.bullets.push({
                    x: player.x + Math.cos(player.angle) * (CONFIG.PLAYER_SIZE_W / 2),
                    y: player.y + Math.sin(player.angle) * (CONFIG.PLAYER_SIZE_W / 2),
                    vx: Math.cos(player.angle + spread) * CONFIG.BULLET_SPEED + player.vx * 0.5,
                    vy: Math.sin(player.angle + spread) * CONFIG.BULLET_SPEED + player.vy * 0.5,
                    life: CONFIG.BULLET_LIFE
                });
            }
        }
    } else if (!isFiringInput || !nearestEnemy) {
        // 撃っていない間は次弾が即座に出るようにタイマーをリセットしておく
        player.fireTimer = playerStats.fireRate;
    }

    // --- Phase 3: 多重スクロール背景座標更新 ---
    stars.forEach(s => {
        s.x -= player.vx * s.layer.rate;
        s.y -= player.vy * s.layer.rate;
        if (s.x < 0) s.x += GAME.width;
        if (s.x > GAME.width) s.x -= GAME.width;
        if (s.y < 0) s.y += GAME.height;
        if (s.y > GAME.height) s.y -= GAME.height;
    });

    // --- エンティティの更新 ---
    for (let i = entities.particles.length - 1; i >= 0; i--) {
        let p = entities.particles[i];
        p.x += p.vx; p.y += p.vy; 
        p.life -= CONFIG.PARTICLE_DECAY;
        if (p.life <= 0) entities.particles.splice(i, 1);
    }

    // デブリ（破片）の更新
    for (let i = entities.debris.length - 1; i >= 0; i--) {
        let d = entities.debris[i];
        d.x += d.vx; d.y += d.vy;
        d.life -= 1.0 / CONFIG.DEBRIS_LIFE;
        if (d.life <= 0) entities.debris.splice(i, 1);
    }

    for (let i = entities.bullets.length - 1; i >= 0; i--) {
        let b = entities.bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        if (b.life <= 0) entities.bullets.splice(i, 1);
    }

    // --- Phase 4: 敵AIと衝突判定 ---
    if (Math.random() < CONFIG.ENEMY_SPAWN_BASE_RATE + (playerStats.level * CONFIG.ENEMY_SPAWN_LEVEL_MULT)) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(GAME.width, GAME.height);
        entities.enemies.push({
            x: player.x + Math.cos(angle) * dist,
            y: player.y + Math.sin(angle) * dist,
            hp: CONFIG.ENEMY_BASE_HP + playerStats.level * CONFIG.ENEMY_HP_LEVEL_MULT,
            flashTimer: 0
        });
    }

    for (let i = entities.enemies.length - 1; i >= 0; i--) {
        let e = entities.enemies[i];
        const edx = player.x - e.x;
        const edy = player.y - e.y;
        e.angle = Math.atan2(edy, edx);
        e.x += Math.cos(e.angle) * CONFIG.ENEMY_SPEED;
        e.y += Math.sin(e.angle) * CONFIG.ENEMY_SPEED;

        if (e.flashTimer > 0) e.flashTimer--;

        let hit = false;
        for (let j = entities.bullets.length - 1; j >= 0; j--) {
            let b = entities.bullets[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < CONFIG.COLLISION_ENEMY_BULLET) {
                e.hp -= CONFIG.BULLET_DAMAGE;
                entities.bullets.splice(j, 1);
                
                // 攻撃ヒット演出（白フラッシュ＆破片）
                e.flashTimer = CONFIG.FLASH_DURATION;
                spawnDebris(e.x, e.y, '#f00', 3 + Math.floor(Math.random()*2), Math.max(2, CONFIG.ENEMY_SIZE_W / 8));

                if (e.hp <= 0) {
                    entities.gems.push({ x: e.x, y: e.y, exp: CONFIG.GEM_BASE_EXP, locked: false, speed: CONFIG.GEM_MAGNET_BASE_SPEED });
                    entities.enemies.splice(i, 1);
                    hit = true;
                    break;
                }
            }
        }
        if (hit) continue;
        
        if (Math.hypot(e.x - player.x, e.y - player.y) < CONFIG.COLLISION_ENEMY_PLAYER) {
            playerStats.hp -= CONFIG.ENEMY_DAMAGE;
            entities.enemies.splice(i, 1);
            
            // 被弾演出（赤フラッシュ＆破片）
            GAME.damageFlashTimer = CONFIG.FLASH_DURATION;
            spawnDebris(player.x, player.y, '#0f0', 3 + Math.floor(Math.random()*2), Math.max(2, CONFIG.PLAYER_SIZE_W / 8));

            if (playerStats.hp <= 0) {
                GAME.state = 'GAMEOVER';
                document.getElementById('game-over-screen').style.display = 'block';
            }
        }
    }

    // --- Phase 5: 成長要素 (ジェム回収) ---
    for (let i = entities.gems.length - 1; i >= 0; i--) {
        let g = entities.gems[i];
        const gdx = player.x - g.x;
        const gdy = player.y - g.y;
        const dist = Math.hypot(gdx, gdy);
        
        // 一度吸引範囲に入ったらロックオン状態になり、加速度がついて必ず回収できる
        if (dist < CONFIG.GEM_MAGNET_RADIUS) { 
            g.locked = true;
        }
        
        if (g.locked) {
            g.speed += CONFIG.GEM_MAGNET_ACCEL; // 加速度を加算
            g.x += (gdx / dist) * g.speed;
            g.y += (gdy / dist) * g.speed;
        }
        
        if (dist < CONFIG.GEM_COLLECT_RADIUS) { 
            playerStats.exp += g.exp;
            entities.gems.splice(i, 1);
            checkLevelUp();
        }
    }
    
    updateHUD();
}

function checkLevelUp() {
    if (playerStats.exp >= playerStats.nextLevelExp) {
        playerStats.level++;
        playerStats.exp -= playerStats.nextLevelExp;
        playerStats.nextLevelExp = Math.floor(playerStats.nextLevelExp * CONFIG.LEVEL_UP_EXP_MULT);
        
        GAME.state = 'PAUSED';
        
        const screen = document.getElementById('level-up-screen');
        const optionsContainer = document.getElementById('upgrade-options');
        optionsContainer.innerHTML = '';
        
        let available = [...upgradePool];
        for (let i = 0; i < 3 && available.length > 0; i++) {
            const idx = Math.floor(Math.random() * available.length);
            const upgrade = available.splice(idx, 1)[0];
            
            const card = document.createElement('div');
            card.className = 'upgrade-card';
            card.innerHTML = `<h3>${upgrade.name}</h3><p>${upgrade.description}</p>`;
            card.onclick = () => {
                upgrade.apply();
                screen.style.display = 'none';
                GAME.state = 'PLAYING';
            };
            optionsContainer.appendChild(card);
        }
        screen.style.display = 'flex';
    }
}

function updateHUD() {
    document.getElementById('ui-level').innerText = playerStats.level;
    document.getElementById('ui-exp').innerText = playerStats.exp;
    document.getElementById('ui-next-exp').innerText = playerStats.nextLevelExp;
    document.getElementById('ui-hp').innerText = playerStats.hp;
}

// ==========================================
// 5. 描画フェーズ (Rendering)
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = GAME.width;
canvas.height = GAME.height;

function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, GAME.width, GAME.height);

    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        ctx.globalAlpha = s.layer.rate;
        ctx.fillRect(s.x, s.y, s.layer.size, s.layer.size);
    });
    ctx.globalAlpha = 1.0;

    ctx.save();
    ctx.translate(GAME.width / 2 - player.x, GAME.height / 2 - player.y);

    entities.gems.forEach(g => {
        ctx.drawImage(SpriteCache.gem, g.x - SpriteCache.gem.width/2, g.y - SpriteCache.gem.height/2);
    });

    entities.particles.forEach(p => {
        ctx.globalAlpha = p.life;
        const scale = Math.max(0.1, p.life);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(scale, scale);
        ctx.drawImage(SpriteCache.particle, -SpriteCache.particle.width/2, -SpriteCache.particle.height/2);
        ctx.restore();
    });
    ctx.globalAlpha = 1.0;

    // デブリ（破片）の描画
    entities.debris.forEach(d => {
        ctx.fillStyle = d.color;
        ctx.globalAlpha = d.life;
        ctx.fillRect(d.x - d.size/2, d.y - d.size/2, d.size, d.size);
    });
    ctx.globalAlpha = 1.0;

    entities.bullets.forEach(b => {
        ctx.drawImage(SpriteCache.bullet, b.x - SpriteCache.bullet.width/2, b.y - SpriteCache.bullet.height/2);
    });

    entities.enemies.forEach(e => {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle);
        ctx.drawImage(SpriteCache.enemy, -SpriteCache.enemy.width/2, -SpriteCache.enemy.height/2);
        
        // 攻撃ヒット時の白フラッシュ
        if (e.flashTimer > 0) {
            ctx.globalAlpha = e.flashTimer / CONFIG.FLASH_DURATION;
            ctx.drawImage(SpriteCache.enemyFlash, -SpriteCache.enemyFlash.width/2, -SpriteCache.enemyFlash.height/2);
            ctx.globalAlpha = 1.0;
        }
        ctx.restore();
    });

    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.drawImage(SpriteCache.player, -SpriteCache.player.width/2, -SpriteCache.player.height/2);
    ctx.restore();

    // ----------------------------------------
    // 自機追従マイクロHUDの描画 (Z-order最前面扱い)
    // ----------------------------------------
    ctx.save();
    ctx.translate(player.x, player.y);
    const hudRadius = 45;
    ctx.lineWidth = 4;
    
    // HPゲージ（左側：下から上へ充填）
    ctx.beginPath();
    ctx.arc(0, 0, hudRadius, 0.7 * Math.PI, 1.3 * Math.PI);
    ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)';
    ctx.stroke();
    
    const hpRatio = Math.max(0, playerStats.hp / playerStats.maxHp);
    if (hpRatio > 0) {
        ctx.beginPath();
        // 1.3*PI (下) から上へ向かって描画するため、反時計回り(true)を指定
        ctx.arc(0, 0, hudRadius, 1.3 * Math.PI, 1.3 * Math.PI - (0.6 * Math.PI * hpRatio), true);
        ctx.strokeStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
        ctx.stroke();
    }

    // ヒートゲージ（右側：下から上へ充填）
    ctx.beginPath();
    ctx.arc(0, 0, hudRadius, -0.3 * Math.PI, 0.3 * Math.PI);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.stroke();
    
    const heatRatio = Math.max(0, Math.min(1, playerStats.heat / CONFIG.HEAT_MAX));
    if (heatRatio > 0) {
        ctx.beginPath();
        // 0.3*PI (下) から上へ向かって描画するため、反時計回り(true)を指定
        ctx.arc(0, 0, hudRadius, 0.3 * Math.PI, 0.3 * Math.PI - (0.6 * Math.PI * heatRatio), true);
        
        if (player.isOverheated) {
            ctx.strokeStyle = '#808080'; // オーバーヒート時はグレー
        } else if (heatRatio > 0.8) {
            ctx.strokeStyle = '#f80';    // 危険域はオレンジ
        } else {
            ctx.strokeStyle = '#fff';    // 通常時は白
        }
        ctx.stroke();
    }
    ctx.restore();

    ctx.restore(); // カメラ適用終了

    // ----------------------------------------
    // 被弾時の画面全体赤フラッシュ演出
    // ----------------------------------------
    if (GAME.damageFlashTimer > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${(GAME.damageFlashTimer / CONFIG.FLASH_DURATION) * 0.4})`;
        ctx.fillRect(0, 0, GAME.width, GAME.height);
        GAME.damageFlashTimer--;
    }
}

// ==========================================
// 6. メインループ
// ==========================================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// 初期化して開始
SpriteCache.init();
loop();

</script>
