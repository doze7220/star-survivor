            handleActiveInput: function (e) {
                if (GAME.commState === 'LEVEL_UP') {
                    if (e.code === 'KeyQ' && GAME.levelUpCards.length > 0) { GAME.levelUpCards[0].apply(); playerStats.levelUpStock--; GAME.commState = 'INACTIVE'; Cielo.play("リミット解除完了！お気をつけて！"); }
                    if (e.code === 'KeyE' && GAME.levelUpCards.length > 1) { GAME.levelUpCards[1].apply(); playerStats.levelUpStock--; GAME.commState = 'INACTIVE'; Cielo.play("リミット解除完了！お気をつけて！"); }
                    if (e.code === 'KeyR' && GAME.levelUpCards.length > 2) { GAME.levelUpCards[2].apply(); playerStats.levelUpStock--; GAME.commState = 'INACTIVE'; Cielo.play("リミット解除完了！お気をつけて！"); }
                } else if (GAME.commState === 'MENU') {
                    if (e.code === 'KeyF') { Cielo.play("了解、貴機座標へベクトル合わせます。Aガレージ、前進！"); GAME.commState = 'INACTIVE'; }
                    if (e.code === 'KeyR') { Cielo.play("目標座標を共有しました。Aガレージ火器管制、最大戦力へ！"); GAME.commState = 'INACTIVE'; }
                    if (e.code === 'KeyE') { Cielo.play("了解、退避ルートへ急行します。……無事に帰ってきてくださいね！"); GAME.commState = 'INACTIVE'; }
                    if (e.code === 'KeyQ') { Cielo.play("了解。未探索エリアへレーダーを展開しながら移動します"); GAME.commState = 'INACTIVE'; }
                }
            },
            draw: function (ctx, radarRadius) {
                if ((playerStats.levelUpStock || 0) > 0 && GAME.commState !== 'LEVEL_UP') {
                    ctx.save();
                    ctx.font = 'bold 12px Courier New';
                    ctx.fillStyle = '#0088ff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillText(`[ PowerUp Stock ${String(playerStats.levelUpStock).padStart(2, '0')} ]`, 0, 50);
                    ctx.fillText(`[    PUSH C KEY   ]`, 0, 65);
                    ctx.restore();
                }

                if (GAME.commState === 'MENU') {
                    ctx.save();
                    ctx.translate(0, radarRadius + 50);
                    ctx.fillStyle = 'rgba(0, 20, 50, 0.7)';
                    ctx.fillRect(-170, 0, 340, 30);
                    ctx.strokeStyle = '#00aaff';
                    ctx.strokeRect(-170, 0, 340, 30);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Courier New';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText("[F]移動 [R]攻撃 [E]退避 [Q]索敵 [C]閉じる", 0, 15);
                    ctx.restore();
                } else if (GAME.commState === 'LEVEL_UP') {
                    ctx.save();
                    ctx.translate(0, radarRadius + 90);

                    const commKeys = ['Q', 'E', 'R'];
                    for (let i = 0; i < GAME.levelUpCards.length; i++) {
                        const card = GAME.levelUpCards[i];
                        const x = -100 + i * 100;
                        const iconSize = 64;

                        ctx.fillStyle = 'rgba(0, 30, 60, 0.9)';
                        ctx.strokeStyle = '#0ff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.roundRect(x - iconSize / 2, -iconSize / 2, iconSize, iconSize, 8);
                        ctx.fill();
                        ctx.stroke();

                        ctx.fillStyle = '#0ff';
                        ctx.font = 'bold 16px Courier New';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'top';
                        ctx.fillText('[' + commKeys[i] + ']', x - iconSize / 2 + 4, -iconSize / 2 + 4);

                        if (card.shortName) {
                            ctx.fillStyle = '#fff';
                            ctx.font = 'bold 12px Courier New';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            const lines = card.shortName.split('\\n');
                            if (lines.length > 1) {
                                ctx.fillText(lines[0], x, 5);
                                ctx.fillText(lines[1], x, 20);
                            } else {
                                ctx.fillText(card.shortName, x, 10);
                            }
                        }
                    }
                    ctx.restore();
                }
            }
        };

        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, GAME.width, GAME.height);

            ctx.fillStyle = '#fff';
            const titleFadeAlpha = GAME.state === 'TITLE' ? Math.max(0, 1.0 - (GAME.fadeAlpha || 0)) : 1.0;
            stars.forEach(s => {
                ctx.globalAlpha = s.layer.rate * titleFadeAlpha;
                ctx.fillRect(s.x, s.y, s.layer.size, s.layer.size);
            });
            ctx.globalAlpha = 1.0;

            if (GAME.state === 'TITLE') {
                drawTitleScreen();
                return;
            }
            if (GAME.state === 'LEVEL_UP') {
                drawLevelUpScreen();
                return;
            }
            if (GAME.state === 'RESULT') {
                drawResultScreen();
                return;
            }

            ctx.save();
            ctx.translate(GAME.width / 2 - player.x, GAME.height / 2 - player.y);

            // --- 母艦 (Anchor Garage) 描画 ---
            ctx.save();
            ctx.translate(CONFIG.MOTHERSHIP_X, CONFIG.MOTHERSHIP_Y);
            ctx.rotate(-Math.PI / 2); // 上向き

            // わずかな非対称性を持たせるため、片側にセンサーアンテナを追加
            ctx.strokeStyle = '#556677';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-50, 60);
            ctx.lineTo(-30, 100);
            ctx.lineTo(20, 100);
            ctx.stroke();
            // アンテナ先端の点滅
            ctx.fillStyle = Date.now() % 1000 < 500 ? '#f00' : '#556677';
            ctx.beginPath();
            ctx.arc(20, 100, 4, 0, Math.PI * 2);
            ctx.fill();

            // 外周構造 (防御・損傷状態の可視化領域)
            ctx.fillStyle = '#1a1f24';
            ctx.strokeStyle = '#334455';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-120, -70);
            ctx.lineTo(40, -70);
            ctx.lineTo(80, -40);
            ctx.lineTo(80, 40);
            ctx.lineTo(40, 70);
            ctx.lineTo(-120, 70);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 居住区の窓明かり（中に人がいる気配）
            ctx.fillStyle = '#ffffaa';
            ctx.globalAlpha = 0.8;
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(-100 + i * 25, -62, 8, 4);
                ctx.fillRect(-100 + i * 25, 58, 8, 4);
            }
            ctx.globalAlpha = 1.0;

            // 補助モジュール1 (上側)
            ctx.fillStyle = '#222d36';
            ctx.fillRect(-80, -90, 60, 20);
            ctx.strokeRect(-80, -90, 60, 20);
            // 補助モジュール2 (下側・少し形状を変えて非対称に)
            ctx.fillRect(-100, 70, 80, 25);
            ctx.strokeRect(-100, 70, 80, 25);

            // 中央コア (生命維持・システム中枢)
            ctx.fillStyle = '#0f141a';
            ctx.beginPath();
            ctx.arc(-20, 0, 45, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // コアの発光 (ゆっくりと脈動させる)
            const pulse = Math.sin(Date.now() / 1000) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(0, 255, 255, ${0.1 + pulse * 0.1})`;
            ctx.beginPath();
            ctx.arc(-20, 0, 35 + pulse * 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.arc(-20, 0, 15, 0, Math.PI * 2);
            ctx.fill();

            // 発着ドック (カタパルト) - 横幅を2.5倍に拡大
            const catW = 150;
            const catH = CONFIG.PLAYER_SIZE_W * 2.5; // 75
            ctx.fillStyle = '#111';
            ctx.fillRect(80, -catH / 2, catW, catH);
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 1;
            ctx.strokeRect(80, -catH / 2, catW, catH);

            // カタパルト上の誘導ライン (発光)
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(80, 0);
            ctx.lineTo(80 + catW, 0);
            ctx.stroke();
            ctx.setLineDash([]);

            // ドックのゲート発光
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.fillRect(80, -catH / 2, 10, catH);

            // エンジン部 (後方)
            ctx.fillStyle = '#111';
            ctx.fillRect(-140, -30, 20, 60);
            // エンジン発光
            ctx.fillStyle = 'rgba(0, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.ellipse(-145, 0, 10, 25, 0, 0, Math.PI * 2);
            ctx.fill();

            // 機体名のペイント
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = 'bold 20px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.save();
            ctx.rotate(Math.PI / 2);
            ctx.fillText('A.GARAGE', 0, 90);
            ctx.restore();

            ctx.restore();

            // --- 敵母艦 (Enemy Mothership) 描画 ---
            if (entities.enemyMothership && !entities.enemyMothership.isDead) {
                let em = entities.enemyMothership;
                ctx.save();
                ctx.translate(em.x, em.y);
                // 敵母艦の向き（Aガレージは-Math.PI/2だが、敵母艦は下向きなら+Math.PI/2とするが、リスポーン位置が上なのでプレイヤーへ向けるか、固定でMath.PI/2にする）
                ctx.rotate(Math.PI / 2); // 下向き

                // センサーアンテナ (少し暗い色)
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(-50, 60);
                ctx.lineTo(-30, 100);
                ctx.lineTo(20, 100);
                ctx.stroke();
                // アンテナ先端の点滅 (赤く高速)
                ctx.fillStyle = Date.now() % 500 < 250 ? '#f00' : '#333';
                ctx.beginPath();
                ctx.arc(20, 100, 4, 0, Math.PI * 2);
                ctx.fill();

                // 外周構造 (黒系・暗灰色)
                ctx.fillStyle = em.flashTimer > 0 ? '#fff' : '#0a0a0a';
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-120, -70);
                ctx.lineTo(40, -70);
                ctx.lineTo(80, -40);
                ctx.lineTo(80, 40);
                ctx.lineTo(40, 70);
                ctx.lineTo(-120, 70);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 居住区の窓明かり（禍々しい赤色）
                ctx.fillStyle = '#ff2222';
                ctx.globalAlpha = 0.8;
                for (let i = 0; i < 3; i++) {
                    ctx.fillRect(-100 + i * 25, -62, 8, 4);
                    ctx.fillRect(-100 + i * 25, 58, 8, 4);
                }
                ctx.globalAlpha = 1.0;

                // 補助モジュール
                ctx.fillStyle = em.flashTimer > 0 ? '#fff' : '#111';
                ctx.fillRect(-80, -90, 60, 20);
                ctx.strokeRect(-80, -90, 60, 20);
                ctx.fillRect(-100, 70, 80, 25);
                ctx.strokeRect(-100, 70, 80, 25);

                // 中央コア (敵コアは赤系)
                ctx.fillStyle = '#1a0000';
                ctx.beginPath();
                ctx.arc(-20, 0, 45, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 3;
                ctx.stroke();

                // コアの発光 (高速脈動)

                ctx.beginPath();
                ctx.arc(-20, 0, 35 + emPulse * 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(-20, 0, 15, 0, Math.PI * 2);
                ctx.fill();

                // 発着ドック (カタパルト)
                const catW = 150;
                const catH = CONFIG.PLAYER_SIZE_W * 2.5; // 75
                ctx.fillStyle = '#050505';
                ctx.fillRect(80, -catH / 2, catW, catH);
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 1;
                ctx.strokeRect(80, -catH / 2, catW, catH);

                // カタパルト上の誘導ライン (赤い発光)
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(80, 0);
                ctx.lineTo(80 + catW, 0);
                ctx.stroke();
                ctx.setLineDash([]);

                // ドックのゲート発光
                ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                ctx.fillRect(80, -catH / 2, 10, catH);

                // エンジン部 (後方)
                ctx.fillStyle = '#000';
                ctx.fillRect(-140, -30, 20, 60);
                // エンジン発光
                ctx.fillStyle = 'rgba(255, 50, 0, 0.6)';
                ctx.beginPath();
                ctx.ellipse(-145, 0, 10, 25, 0, 0, Math.PI * 2);
                ctx.fill();

                // HPバーの描画
                ctx.save();
                ctx.rotate(-Math.PI / 2); // 画面に対して水平に戻す
                const hpRatio = em.hp / em.maxHp;
                const barW = 100;
                const barH = 6;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(-barW / 2, 100, barW, barH); // 機体下部に表示
                ctx.fillStyle = '#f00';
                ctx.fillRect(-barW / 2, 100, barW * hpRatio, barH);
                ctx.restore();

                ctx.restore();
            }

            // --- ランディングエリア表示（着艦中・発艦中・ターゲット中・クリア後は非表示）---
            if (!player.isLandingSequence && !GAME.launchSequence && !GAME.isMissionClear && entities.enemies.length === 0) {
                const lcat = getCatapultSpec();
                const landingColor = 'rgba(0, 220, 100, 0.18)';
                const landingStroke = 'rgba(0, 220, 100, 0.55)';
                ctx.save();
                ctx.beginPath();
                ctx.arc(lcat.tipX, lcat.tipY, 50, 0, Math.PI * 2);
                ctx.fillStyle = landingColor;
                ctx.fill();
                ctx.strokeStyle = landingStroke;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = landingStroke;
                ctx.font = 'bold 11px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('LANDING AREA', lcat.tipX, lcat.tipY - 54);
                ctx.restore();
            }

            // --- 補給中のステータス表示 ---
            if (player.isLandingSequence && player.landingPhase === 'RESUPPLY' && player.needsResupplyVisual) {
                ctx.save();
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 14px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('REPAIRING & RESUPPLYING...', player.x, player.y - 40);
                // ゲージの簡易表示
                ctx.strokeStyle = '#0ff';
                ctx.strokeRect(player.x - 50, player.y - 30, 100, 6);
                const progress = (120 - player.landingTimer) / 120;
                ctx.fillRect(player.x - 50, player.y - 30, 100 * progress, 6);
                ctx.restore();
            }

            entities.gems.forEach(g => {
                let sprite = SpriteCache.gem;
                if (g.kind === 'HEAL') sprite = SpriteCache.gemHeal;
                if (g.kind === 'BIG_EXP') sprite = SpriteCache.gemBigExp;
                const drawSize = sprite.width;
                ctx.drawImage(sprite, g.x - drawSize / 2, g.y - drawSize / 2);
            });

            entities.particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                if (p.type === 'DEBRIS_SMOKE') {
                    // 半透明の煙（灰色の●で表現、拡大しながら薄れて消える）
                    const progress = 1.0 - (p.life / p.maxLife); // 0.0 〜 1.0
                    const scale = 1.0 + progress * 1.0; // 1倍から2倍へ拡大
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = '#888'; // 灰色
                    ctx.beginPath();
                    ctx.arc(0, 0, p.baseSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'ENEMY_THRUSTER') {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.drawImage(SpriteCache.particleEnemy, -SpriteCache.particleEnemy.width / 2, -SpriteCache.particleEnemy.height / 2);
                } else if (p.type === 'SMOKE') {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = p.color || '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.drawImage(SpriteCache.particlePlayer, -SpriteCache.particlePlayer.width / 2, -SpriteCache.particlePlayer.height / 2);
                }
                ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            // デブリ（破片）の描画（最後の30%でフェードアウト）
            entities.debris.forEach(d => {
                ctx.fillStyle = d.color;
                ctx.globalAlpha = Math.min(1.0, d.life / 0.3);
                ctx.fillRect(d.x - d.size / 2, d.y - d.size / 2, d.size, d.size);
            });
            ctx.globalAlpha = 1.0;

            // 敵の弾描画 (細い赤い楕円形＋白いコアのSF風レーザー)
            entities.enemyBullets.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                const angle = Math.atan2(b.vy, b.vx);
                ctx.rotate(angle);

                // 外側の赤い発光
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 2.8, CONFIG.BULLET_SIZE * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // 内側の白いコア
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 1.8, CONFIG.BULLET_SIZE * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });

            // 自機の弾描画 (細い黄色の楕円形＋白いコアのSF風レーザー)
            entities.bullets.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                const angle = Math.atan2(b.vy, b.vx);
                ctx.rotate(angle);

                // 外側の黄色の発光
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 2.8, CONFIG.BULLET_SIZE * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // 内側の白いコア
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 1.8, CONFIG.BULLET_SIZE * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });

            // ミサイル描画 (▲と■の組み合わせ、色は白)
            entities.missiles.forEach(m => {
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(m.angle);

                ctx.fillStyle = '#fff';
                // 四角部分 (■)
                ctx.fillRect(-6, -2.5, 5, 5);
                // 三角部分 (▲)
                ctx.beginPath();
                ctx.moveTo(6, 0);
                ctx.lineTo(-1, -3.5);
                ctx.lineTo(-1, 3.5);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            });
            // 自機の２本スラスター描画
            if (!GAME.isPlayerDying) {
                drawRibbonTrail(player.leftTrailHistory, '#00d2ff', 7);  // トムキャット風のツインバーニア（シアンブルー）
                drawRibbonTrail(player.rightTrailHistory, '#00d2ff', 7); // トムキャット風のツインバーニア（シアンブルー）
            }

            // =================================================================
            // 【主人公専用演出】ベクターパス方式による風トレイル（スリップストリーム）
            // =================================================================
            const drawWindTrail = (history) => {
                if (history && history.length >= 2) {
                    // 速度に基づくアルファ値の計算
                    const latestSpeed = Math.hypot(player.vx, player.vy);
                    const safeMaxSpeed = Math.max(playerStats.maxSpeed, CONFIG.WIND_TRAIL_MIN_SPEED + 0.1);
                    const speedRatio = Math.max(0, Math.min(1.0, (latestSpeed - CONFIG.WIND_TRAIL_MIN_SPEED) / (safeMaxSpeed - CONFIG.WIND_TRAIL_MIN_SPEED)));

                    if (speedRatio <= 0) return;

                    ctx.save();
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = `rgba(255, 255, 255, ${speedRatio * 0.25})`; // 白色、速度に応じたアルファ

                    // トレイルの太さを曲線（Math.sin）で計算し、セグメントごとに描画する
                    // 最大幅はメインバーニア(7)の半分(=3.5)
                    const maxWidth = 3.5;

                    for (let i = 0; i < history.length - 1; i++) {
                        const p1 = history[i];
                        const p2 = history[i + 1];

                        // 全体の中での位置 (0.0 〜 1.0)
                        const ratio = (i + 0.5) / (history.length - 1);

                        // sinカーブで 0 -> 1 -> 0 になるよう太さを設定
                        ctx.lineWidth = maxWidth * Math.sin(ratio * Math.PI);

                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);

                        if (i === history.length - 2) {
                            ctx.lineTo(p2.x, p2.y);
                        } else {
                            const midX = (p1.x + p2.x) / 2;
                            const midY = (p1.y + p2.y) / 2;
                            ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                        }
                        ctx.stroke();
                    }

                    ctx.restore();
                }
            };
            drawWindTrail(player.leftWindTrailHistory);
            drawWindTrail(player.rightWindTrailHistory);
            // =================================================================

            // 敵機の１本スラスター描画
            entities.enemies.forEach(e => {
                let color = CONFIG.COLOR_ENEMY_DOGFIGHTER;
                if (e.personality === 'RAMMER') color = CONFIG.COLOR_ENEMY_RAMMER;
                if (e.personality === 'SNIPER') color = CONFIG.COLOR_ENEMY_SNIPER;
                drawRibbonTrail(e.trailHistory, color, 5); // 太さはやや細め、長さも半分
            });

            // 敵機描画
            entities.enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);

                // 敵のHPゲージ・ヒートゲージ (機体の下に回転せず描画)
                const barW = 30;
                // 上段：HPゲージ
                const hpRatio = Math.max(0, e.hp / e.maxHp);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(-barW / 2, 22, barW, 3);
                ctx.fillStyle = hpRatio <= 0.2 ? '#f00' : '#0f0';
                ctx.fillRect(-barW / 2, 22, barW * hpRatio, 3);

                // 下段：ヒートゲージ
                if (e.heat > 0) {
                    const heatRatio = Math.max(0, Math.min(1, e.heat / CONFIG.HEAT_MAX));
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(-barW / 2, 26, barW, 3);
                    if (e.isOverheated) {
                        ctx.fillStyle = '#808080';
                    } else if (heatRatio > 0.8) {
                        ctx.fillStyle = '#f80';
                    } else {
                        ctx.fillStyle = '#fff';
                    }
                    ctx.fillRect(-barW / 2, 26, barW * heatRatio, 3);
                }

                ctx.rotate(e.angle);

                // 性格に応じたプリレンダースプライトを選択
                let sprite = SpriteCache.enemyDogfighter;
                if (e.personality === 'RAMMER') sprite = SpriteCache.enemyRammer;
                if (e.personality === 'SNIPER') sprite = SpriteCache.enemySniper;

                ctx.drawImage(sprite, -sprite.width / 2, -sprite.height / 2);

                // 攻撃ヒット時の白フラッシュ
                if (e.flashTimer > 0) {
                    ctx.globalAlpha = e.flashTimer / CONFIG.FLASH_DURATION;
                    ctx.drawImage(SpriteCache.enemyFlash, -SpriteCache.enemyFlash.width / 2, -SpriteCache.enemyFlash.height / 2);
                    ctx.globalAlpha = 1.0;
                }
                ctx.restore();
            });

            // 自機描画とマイクロHUD (生存時のみ)
            if (!GAME.isPlayerDying) {
                // 砲塔描画 (機体より先に描画して下に隠れるようにする)
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.turretAngle);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, -3, CONFIG.PLAYER_SIZE_W / 2 + 10, 6);
                ctx.restore();

                // 自機描画 (土台)
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.bodyAngle);
                ctx.drawImage(SpriteCache.player, -SpriteCache.player.width / 2, -SpriteCache.player.height / 2);
                ctx.restore();

                // ----------------------------------------
                // 自機追従マイクロHUDの描画 (Z-order最前面扱い - 発進シーケンス中以外のみ)
                // ----------------------------------------
                if (!GAME.launchSequence) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.lineWidth = 4;

                    // --- 右側：HPゲージ (内側 半径39、2時〜4時) ---
                    const hpRadius = 39;
                    ctx.beginPath();
                    ctx.arc(0, 0, hpRadius, -Math.PI / 6, Math.PI / 6); // 背景 (2時〜4時)
                    ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)';
                    ctx.stroke();

                    const hpRatio = Math.max(0, playerStats.hp / playerStats.maxHp);
                    if (hpRatio > 0) {
                        ctx.beginPath();
                        const startAngle = -Math.PI / 6;
                        const endAngle = startAngle + (Math.PI / 3) * hpRatio;
                        ctx.arc(0, 0, hpRadius, startAngle, endAngle, false);
                        ctx.strokeStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
                        ctx.stroke();
                    }

                    // --- 右側：ヒートゲージ (外側 半径45、2時〜4時) ---
                    const heatRadius = 45;
                    ctx.beginPath();
                    ctx.arc(0, 0, heatRadius, -Math.PI / 6, Math.PI / 6); // 背景 (2時〜4時)
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.stroke();

                    const heatRatio = Math.max(0, Math.min(1, playerStats.heat / CONFIG.HEAT_MAX));
                    if (heatRatio > 0) {
                        ctx.beginPath();
                        const startAngle = -Math.PI / 6;
                        const endAngle = startAngle + (Math.PI / 3) * heatRatio;
                        ctx.arc(0, 0, heatRadius, startAngle, endAngle, false);
                        if (player.isOverheated) {
                            ctx.strokeStyle = '#808080';
                        } else if (heatRatio > 0.8) {
                            ctx.strokeStyle = '#f80';
                        } else {
                            ctx.strokeStyle = '#fff';
                        }
                        ctx.stroke();
                    }

                    // --- 左側中段：ブーストゲージ (内側 半径39、10時〜8時) ---
                    // 現在のEXPの位置にブーストゲージ（オレンジ）を配置
                    const boostRadius = 39;
                    ctx.beginPath();
                    ctx.arc(0, 0, boostRadius, 5 * Math.PI / 6, 7 * Math.PI / 6); // 背景
                    ctx.strokeStyle = 'rgba(255, 136, 0, 0.2)';
                    ctx.stroke();

                    const boostRatio = (player.boostGauge !== undefined ? player.boostGauge : 80) / 80;
                    if (boostRatio > 0) {
                        ctx.beginPath();
                        const startAngle = 7 * Math.PI / 6; // 8時から
                        const endAngle = startAngle - (Math.PI / 3) * boostRatio; // 10時へ向かって
                        ctx.arc(0, 0, boostRadius, startAngle, endAngle, true);
                        ctx.strokeStyle = '#f80';
                        ctx.stroke();
                    }

                    // --- 左側外段：EXPゲージ (外側 半径45、10時〜8時) ---
                    const expRadius = 45;
                    ctx.beginPath();
                    ctx.arc(0, 0, expRadius, 5 * Math.PI / 6, 7 * Math.PI / 6); // 背景
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.stroke();

                    const expRatio = Math.max(0, Math.min(1, playerStats.exp / playerStats.nextLevelExp));
                    if (expRatio > 0) {
                        ctx.beginPath();
                        const startAngle = 7 * Math.PI / 6; // 8時から
                        const endAngle = startAngle - (Math.PI / 3) * expRatio; // 10時へ向かって
                        ctx.arc(0, 0, expRadius, startAngle, endAngle, true);
                        ctx.strokeStyle = '#0ff';
                        ctx.stroke();
                    }

                    ctx.restore();
                } // GAME.launchSequence wrapper end
            }

            // 爆発の描画 (共通関数を利用)
            entities.explosions.forEach(exp => {
                drawExplosion(ctx, exp);
            });

            ctx.restore(); // カメラ適用終了

            // ----------------------------------------
            // プレイヤー中心レーダーと敵方向マーカー描画
            // ----------------------------------------
            if (!GAME.isPlayerDying && !GAME.launchSequence && !player.isLandingSequence) {
                ctx.save();
                ctx.translate(GAME.width / 2, GAME.height / 2);

                // レーダーゲージ（真円）
                const radarRadius = CONFIG.RADAR_RADIUS;
                ctx.strokeStyle = 'rgba(255, 0, 0, 1.0)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, radarRadius, 0, Math.PI * 2);
                ctx.stroke();

                // ヒゲ（東西南北＋斜め45度）
                for (let i = 0; i < 8; i++) {
                    const a = (Math.PI / 4) * i;
                    const cosA = Math.cos(a);
                    const sinA = Math.sin(a);
                    ctx.beginPath();
                    // 5px外側に飛び出すヒゲ
                    ctx.moveTo(cosA * radarRadius, sinA * radarRadius);
                    ctx.lineTo(cosA * (radarRadius + 5), sinA * (radarRadius + 5));
                    ctx.stroke();
                }

                // 砲塔方向を示す TARGET マーカー（▲とTARGETの文字）
                ctx.save();
                ctx.rotate(player.turretAngle);
                ctx.fillStyle = '#0f0'; // 自機と同じ色(緑)
                // ▲アイコンをレーダー内側に表示 (サイズ拡大)
                ctx.beginPath();
                ctx.moveTo(radarRadius - 15, 0); // 先端 (外側へ)
                ctx.lineTo(radarRadius - 35, -8); // 後ろ上 (幅を広げ、後ろに引く)
                ctx.lineTo(radarRadius - 35, 8);  // 後ろ下
                ctx.closePath();
                ctx.fill();

                // TARGET文字 (重なり防止のため、底辺からさらに内側へ離す)
                ctx.font = 'bold 10px Courier New';
                ctx.fillStyle = '#0f0'; // 文字も自機色(緑)に
                ctx.textAlign = 'center';

                // 底辺の中心 (radarRadius - 35, 0) からさらに離し、(radarRadius - 45, 0) に翻訳
                ctx.translate(radarRadius - 45, 0);

                let textAngle = player.turretAngle;
                while (textAngle < 0) textAngle += Math.PI * 2;
                textAngle = textAngle % (Math.PI * 2);

                // 画面下半分の角度では文字が裏返らないように180度反転
                // 重なりを防ぐため、常にレーダーの中心寄りに押し出すよう textBaseline を出し分け
                if (textAngle > Math.PI / 2 && textAngle < Math.PI * 1.5) {
                    ctx.rotate(-Math.PI / 2);
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('TARGET', 0, -2);
                } else {
                    ctx.rotate(Math.PI / 2);
                    ctx.textBaseline = 'top';
                    ctx.fillText('TARGET', 0, 2);
                }
                ctx.restore();

                // --- 母艦（Anchor Garage）への方向マーカー ---
                const msDx = CONFIG.MOTHERSHIP_X - player.x;
                const msDy = CONFIG.MOTHERSHIP_Y - player.y;
                const msAngle = Math.atan2(msDy, msDx);
                const msDist = Math.hypot(msDx, msDy);

                // 母艦が画面内に十分入っているか判定（表示内ならレーダーを非表示にする）
                // 画面端からのマージンを考慮して判定（画面外へ少し出たらすぐレーダーがガイドするよう +200 程度余裕を持たせる）
                const isMsVisible = Math.abs(msDx) <= GAME.width / 2 + 200 && Math.abs(msDy) <= GAME.height / 2 + 200;

                if (!isMsVisible) {
                    // 距離のフォーマット (1~999m、1.0km～で表記切り替え)
                    const msDistRounded = Math.floor(msDist);
                    let msDistStr = "";
                    if (msDistRounded >= 1000) {
                        msDistStr = (msDist / 1000).toFixed(1) + "km";
                    } else {
                        msDistStr = Math.max(1, msDistRounded) + "m";
                    }

                    ctx.save();
                    ctx.rotate(msAngle);
                    ctx.fillStyle = '#fff'; // 母艦のレーダーアイコンは白にする

                    // ▲アイコンをレーダー内側に表示 (TARGETと同じサイズに拡大)
                    ctx.beginPath();
                    ctx.moveTo(radarRadius - 15, 0); // 先端
                    ctx.lineTo(radarRadius - 35, -8); // 後ろ上
                    ctx.lineTo(radarRadius - 35, 8);  // 後ろ下
                    ctx.closePath();
                    ctx.fill();

                    // 三角の下側（レーダーの中心側）に A.GARAGE と距離を表示 (白にする)
                    // テキストも三角の回転に合わせて一緒に回転する
                    ctx.fillStyle = '#fff'; // テキスト・距離も白
                    ctx.textAlign = 'center';

                    // 底辺の中心から十分離し、(radarRadius - 45, 0) に翻訳
                    ctx.translate(radarRadius - 45, 0);

                    let msTextAngle = msAngle;
                    while (msTextAngle < 0) msTextAngle += Math.PI * 2;
                    msTextAngle = msTextAngle % (Math.PI * 2);

                    // 画面下半分の角度では文字が裏返らないように180度反転
                    // 重なりを防ぐため、常にレーダーの中心寄りに押し出すよう textBaseline とテキスト位置を調整
                    if (msTextAngle > Math.PI / 2 && msTextAngle < Math.PI * 1.5) {
                        ctx.rotate(-Math.PI / 2);
                        ctx.textBaseline = 'bottom';
                        ctx.font = 'bold 10px Courier New';
                        ctx.fillText('A.GARAGE', 0, -18);
                        ctx.font = 'bold 16px Courier New';
                        ctx.fillText(msDistStr, 0, -2);
                    } else {
                        ctx.rotate(Math.PI / 2);
                        ctx.textBaseline = 'top';
                        ctx.font = 'bold 10px Courier New';
                        ctx.fillText('A.GARAGE', 0, 18);
                        ctx.font = 'bold 16px Courier New';
                        ctx.fillText(msDistStr, 0, 2);
                    }
                    ctx.restore();
                }

                // 画面外エネミーの方向マーカーと距離表示
                entities.enemies.forEach(e => {
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.hypot(dx, dy);
                    const halfW = GAME.width / 2;
                    const halfH = GAME.height / 2;

                    // 画面外にいる敵のみ表示
                    if (Math.abs(dx) > halfW || Math.abs(dy) > halfH) {
                        const angle = Math.atan2(dy, dx);

                        ctx.save();
                        // 真円のすぐ外側（半径 + 15pxの位置）にマーカーを配置
                        const markerX = Math.cos(angle) * (radarRadius + 15);
                        const markerY = Math.sin(angle) * (radarRadius + 15);
                        ctx.translate(markerX, markerY);

                        // マーカー本体の描画（回転させる）
                        ctx.save();
                        ctx.rotate(angle + Math.PI / 2); // ▲の頂点が敵の方向を向くように回転

                        ctx.fillStyle = 'rgba(255, 50, 50, 0.8)';
                        ctx.strokeStyle = 'rgba(255, 50, 50, 0.8)';

                        // 赤い▲
                        ctx.beginPath();
                        ctx.moveTo(0, -8);  // 少し小ぶりに調整
                        ctx.lineTo(-6, 4);
                        ctx.lineTo(6, 4);
                        ctx.closePath();
                        ctx.fill();

                        // 下部の線（天地を示す ＿）
                        ctx.beginPath();
                        ctx.moveTo(-8, 6);
                        ctx.lineTo(8, 6);
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.restore(); // マーカーの回転リセット

                        // 距離テキストの描画（回転させず水平を保つ）
                        let distText = "";
                        if (dist >= 999) {
                            distText = (dist / 1000).toFixed(1) + "km";
                        } else {
                            distText = Math.floor(dist) + "m";
                        }

                        // テキスト位置をさらに外側へ押し出す
                        const textOffset = 18;
                        const textX = Math.cos(angle) * textOffset;
                        const textY = Math.sin(angle) * textOffset;

                        ctx.fillStyle = 'rgba(255, 50, 50, 0.9)';
                        ctx.font = 'bold 12px Courier New';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(distText, textX, textY);

                        // 敵の残りHP表示
                        const hpRatio = Math.max(0, e.hp / e.maxHp);
                        const hpPercent = Math.floor(hpRatio * 100);
                        ctx.font = '10px Courier New';
                        ctx.fillStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
                        ctx.fillText(`HP:${hpPercent}%`, textX, textY + 12);

                        ctx.restore(); // 位置リセット
                    }
                });

                // 資源レーダー (画面外のEXP, BIG_EXP, HEAL を表示)
                entities.gems.forEach(g => {
                    if (g.kind !== 'EXP' && g.kind !== 'BIG_EXP' && g.kind !== 'HEAL') return;

                    const dx = g.x - player.x;
                    const dy = g.y - player.y;
                    const dist = Math.hypot(dx, dy);
                    const halfW = GAME.width / 2;
                    const halfH = GAME.height / 2;

                    // 最大距離5000mのアイテムを表示（画面内にある場合も表示する）
                    if (dist <= 5000) {
                        const angle = Math.atan2(dy, dx);

                        // 画面外境界（おおよそ 500px とみなす）からの距離超過分
                        // 画面内(overDist=0)の場合は alpha=1.0 となる
                        const overDist = Math.max(0, dist - Math.max(halfW, halfH));
                        // 200m(px)ごとに alpha が 0.1 下がる。最大透明度80% (alpha 0.2)
                        const alphaDrop = Math.floor(overDist / 200) * 0.1;
                        const alpha = Math.max(0.2, 1.0 - alphaDrop);

                        let color = '#0ff'; // EXP
                        if (g.kind === 'BIG_EXP') color = '#ff0';
                        if (g.kind === 'HEAL') color = '#0f0';

                        ctx.save();
                        ctx.rotate(angle);

                        // 母艦マーカー(幅20、長さ35)の半分サイズ(幅10、長さ17.5)の▲を描画
                        ctx.fillStyle = color;
                        ctx.globalAlpha = alpha;

                        ctx.beginPath();
                        ctx.moveTo(radarRadius - 10, 0); // 先端
                        ctx.lineTo(radarRadius - 27.5, -5); // 後ろ上
                        ctx.lineTo(radarRadius - 27.5, 5);  // 後ろ下
                        ctx.closePath();
                        ctx.fill();

                        ctx.restore();
                    }
                });
                // --- v0.5.00 マイクロHUD拡張 ---
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // A. レベル＆経験値表示（上部）
                ctx.font = 'bold 12px Courier New';
                ctx.fillStyle = '#0ff';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                drawCircularText(ctx, `Lv.${playerStats.level.toString().padStart(3, '0')} Exp.${playerStats.exp}/${playerStats.nextLevelExp}`, radarRadius + 20, -Math.PI / 2, false);

                // B. スピード＆Gフォースメーター（下部）
                const speedKms = ((Math.hypot(player.vx, player.vy) * 60) / 1000).toFixed(1);
                const prevVx = player.prevVx || 0;
                const prevVy = player.prevVy || 0;
                const gForce = (Math.hypot(player.vx - prevVx, player.vy - prevVy) * 1.5).toFixed(1);

                ctx.fillStyle = '#0ff';
                drawCircularText(ctx, `SPD: ${speedKms} km/s`, radarRadius + 20, Math.PI / 2, true);
                ctx.fillStyle = '#f80';
                drawCircularText(ctx, `ACC: ${gForce} G`, radarRadius + 35, Math.PI / 2, true);

                // C. ダイナミック・コンテクスト・アラート
                // 優先度: WARNING > OVERHEAT > DOCK INBOUND
                let alertText = "";
                let alertColor = "";

                let isWarning = player.flashTimer > 0;
                if (!isWarning) {
                    for (let i = 0; i < entities.enemies.length; i++) {
                        const e = entities.enemies[i];
                        if (Math.hypot(e.x - player.x, e.y - player.y) < 300) {
                            isWarning = true;
                            break;
                        }
                    }
                }

                if (isWarning) {
                    alertText = "WARNING";
                    alertColor = "#f00";
                } else if (player.isOverheated) {
                    alertText = "OVERHEAT";
                    alertColor = "#f80";
                } else if (!GAME.launchSequence && !player.isLandingSequence) {
                    const msDist = Math.hypot(CONFIG.MOTHERSHIP_X - player.x, CONFIG.MOTHERSHIP_Y - player.y);
                    if (msDist < 500 && Math.hypot(player.vx, player.vy) < 2) {
                        alertText = "DOCK INBOUND";
                        alertColor = "#0f0";
                    }
                }

                if (alertText) {
                    const alpha = (Math.sin(Date.now() / 150) + 1) / 2 * 0.5 + 0.5;
                    ctx.globalAlpha = alpha;
                    ctx.font = 'bold 16px Courier New';
                    ctx.fillStyle = alertColor;
                    ctx.shadowColor = alertColor;
                    ctx.shadowBlur = 8;
                    ctx.fillText(alertText, 0, -50);
                }

                ctx.restore();

                CommStateManager.draw(ctx, radarRadius);

                ctx.restore();
            }

            // ----------------------------------------
            // 被弾時の画面全体赤フラッシュ演出
            // ----------------------------------------
            if (GAME.damageFlashTimer > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${(GAME.damageFlashTimer / CONFIG.FLASH_DURATION) * 0.4})`;
                ctx.fillRect(0, 0, GAME.width, GAME.height);
                GAME.damageFlashTimer--;
            }

            // ----------------------------------------
            // 発進シーケンスの Canvas ベクターカウントダウン描画
            // ----------------------------------------
            if (GAME.launchSequence && GAME.launchTimer <= 240) {
                let currentText = "";
                let frameInCycle = 0;

                if (GAME.launchTimer <= 60) {
                    currentText = "3";
                    frameInCycle = GAME.launchTimer;
                } else if (GAME.launchTimer <= 120) {
                    currentText = "2";
                    frameInCycle = GAME.launchTimer - 60;
                } else if (GAME.launchTimer <= 180) {
                    currentText = "1";
                    frameInCycle = GAME.launchTimer - 120;
                } else if (GAME.launchTimer <= 240) {
                    currentText = "GO!";
                    frameInCycle = GAME.launchTimer - 180;
                }

                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                let opacity = 1.0;
                let fontSize = 150;

                if (frameInCycle <= 48) {
                    const p = frameInCycle / 48;
                    fontSize = 200 - 50 * p; // スケールダウンしながら出現
                    opacity = p;
                } else {
                    const p = (frameInCycle - 48) / 12;
                    fontSize = 150;
                    opacity = 1.0 - p; // 急速にフェードアウト
                }

                // ネオンシアンのグローエフェクト
                ctx.shadowColor = '#0ff';
                ctx.shadowBlur = 30;
                ctx.fillStyle = `rgba(0, 255, 255, ${opacity})`;
                ctx.font = `bold ${fontSize}px Courier New`;
                ctx.fillText(currentText, GAME.width / 2, GAME.height / 2);

                ctx.restore();
            }

            // ミニマップ描画
            Minimap.draw(ctx);

            // ----------------------------------------
            // 画面全体のフェード処理
            // ----------------------------------------
            if (GAME.fadeAlpha > 0) {
                ctx.fillStyle = `rgba(0, 0, 0, ${GAME.fadeAlpha})`;
                ctx.fillRect(0, 0, GAME.width, GAME.height);
            }
        }

        // ==========================================
        // 6. メインループ
        // ==========================================
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 初期化して開始
        SpriteCache.init();
        Cielo.init();
        loop();

    </script>
</body>

</html>
