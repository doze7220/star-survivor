<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARDRIFTER - Alpha 1</title>
    <style>
        /* CSSリセットとベース設定 */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
        }

        /* UIレイヤー (キャンバスの上にかぶせる) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* HUD (ヘッドアップディスプレイ) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px #000;
        }

        #hud div {
            margin-bottom: 5px;
        }

        /* レベルアップ画面 (三者択一UI) */
        #level-up-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.9);
            border: 2px solid #0ff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        #level-up-screen h2 {
            margin-top: 0;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .upgrade-options {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .upgrade-card {
            border: 1px solid #44f;
            padding: 20px;
            cursor: pointer;
            width: 200px;
            text-align: center;
            background: rgba(20, 20, 50, 0.8);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .upgrade-card:hover {
            background: rgba(50, 50, 100, 0.9);
            transform: scale(1.05);
            border-color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .upgrade-card h3 {
            margin: 0 0 10px 0;
            color: #fff;
        }

        .upgrade-card p {
            margin: 0;
            color: #aaa;
            font-size: 0.9rem;
        }

        /* ゲームオーバー画面 */
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            pointer-events: auto;
            background: rgba(30, 0, 0, 0.9);
            padding: 50px;
            border: 2px solid #f00;
            border-radius: 10px;
        }

        #game-over-screen h1 {
            color: #f00;
            font-size: 3rem;
            margin-top: 0;
        }

        button {
            padding: 10px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #222;
            color: #fff;
            border: 1px solid #f00;
            border-radius: 5px;
            font-family: inherit;
            transition: 0.2s;
        }

        button:hover {
            background: #f00;
            color: #000;
        }

        /* Cielo Communication */
        #cielo-comm {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 1px 1px 2px #000;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* Credits (Bounty) */
        #credits-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaa00;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        /* Stats Panel (右下UI) */
        #stats-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #aaa;
            text-shadow: 1px 1px 2px #000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .stat-category {
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: linear-gradient(to left, rgba(0, 50, 100, 0.4), transparent);
            padding: 5px 15px;
            border-right: 2px solid #0ff;
        }

        .stat-category-title {
            color: #0ff;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 2px;
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .stat-label {
            color: #888;
            font-family: 'Courier New', Courier, monospace;
        }

        .stat-value {
            color: #fff;
            min-width: 80px;
            text-align: right;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="credits-panel">BOUNTY: <span id="ui-credits">0</span> c</div>
        <div id="cielo-comm"></div>
        <div id="hud">
            <div>LEVEL: <span id="ui-level">1</span></div>
            <div>EXP: <span id="ui-exp">0</span> / <span id="ui-next-exp">100</span></div>
            <div>HP: <span id="ui-hp">100</span></div>
        </div>

        <div id="stats-panel"></div>

        <div id="level-up-screen">
            <h2>LEVEL UP!</h2>
            <div class="upgrade-options" id="upgrade-options"></div>
        </div>

        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <button onclick="location.reload()">RESTART SYSTEM</button>
        </div>
    </div>

    <script>
        /**
         * VANGUARDRIFTER - Alpha 1 Implementation
         */

        // ==========================================
        // 0. ゲーム調整用パラメータ設定 (CONFIG)
        // ==========================================
        const CONFIG = {
            // 【物理・自機基本設定】
            FRICTION: 0.98,               // 宇宙空間の摩擦係数（慣性のすべり具合。1.0で完全無摩擦）
            PLAYER_BASE_MOVE_SPEED: 0.8,    // 自機の初期移動力（W/A/S/Dキー押し込み時の加速度）
            PLAYER_BASE_MAX_SPEED: 8.0,     // 自機の初期最高速度
            PLAYER_BASE_HP: 100,          // 自機の初期HP
            PLAYER_SIZE_W: 30,            // 自機のグラフィック幅（ピクセル）
            PLAYER_SIZE_H: 36,            // 自機のグラフィック高（ピクセル）

            // 【射撃・弾設定】
            BULLET_BASE_FIRE_RATE: 20,    // 射撃の初期連射速度（フレーム間隔。低いほど高速連射）
            BULLET_SPEED: 15,             // ショットの飛翔弾速
            BULLET_DAMAGE: 10,            // ショット1発あたりの敵へのダメージ
            BULLET_LIFE: 100,             // ショットの生存寿命（フレーム数。射程距離に影響）
            BULLET_SIZE: 4,               // ショットの半径（ピクセル）
            BULLET_SPREAD_ANGLE: 0.15,    // 複数弾発射（マルチショット）時の1弾あたりの拡散角度（ラジアン）
            AUTO_AIM_RADIUS: 600,         // 自動エイムが敵を捕捉する最大半径（ピクセル）

            // 【ヒートゲージ設定】
            HEAT_MAX: 100,                // ヒートゲージの最大容量
            HEAT_PER_SHOT: 8,             // 1発射撃ごとの熱上昇量
            HEAT_COOL_RATE: 0.8,          // 射撃していない時の毎フレームの冷却量
            HEAT_OVERHEAT_PENALTY: 180,   // オーバーヒート時の冷却完了までのペナルティ時間（フレーム数。約3秒）

            // 【敵機設定】
            ENEMY_MAX_COUNT: 5,          // 敵の同時出現最大数（初期値）
            ENEMY_SIZE_W: 30,             // 敵機のグラフィック幅
            ENEMY_SIZE_H: 36,             // 敵機のグラフィック高
            ENEMY_ACCEL: 0.2,             // 敵機の加速度（慣性移動用）
            ENEMY_MAX_SPEED: 5.0,         // 敵機の最高速度
            ENEMY_FIRE_RATE: 40,          // 敵機の射撃間隔（フレーム数）
            ENEMY_BULLET_SPEED: 10,       // 敵の弾速
            ENEMY_BASE_HP: 20,            // 敵機の初期HP（レベル1時点）
            ENEMY_HP_LEVEL_MULT: 5,       // プレイヤーのレベル上昇に伴う敵HPの増加量（レベルごとに加算）
            ENEMY_SPAWN_BASE_RATE: 0.04,  // 敵機の基本スポーン率（毎フレームごとの出現判定確率）
            ENEMY_SPAWN_LEVEL_MULT: 0.005, // プレイヤーレベル上昇時の敵機スポーン増加係数
            ENEMY_DAMAGE: 15,             // 敵機本体に衝突した際に自機が受けるダメージ量
            ENEMY_BULLET_DAMAGE: 10,      // 敵の弾に当たった際のダメージ

            // 【敵の性格出現確率（初期値、合計値に対する比率）】
            ENEMY_CHANCE_RAMMER: 30,      // 肉薄・体当たり型 (初期30%)
            ENEMY_CHANCE_SNIPER: 20,      // 距離維持・遠距離射撃型 (初期20%)
            ENEMY_CHANCE_DOGFIGHTER: 50,  // すれ違いドッグファイト型 (初期50%)

            // 【敵機カラー設定】
            COLOR_ENEMY_RAMMER: '#555555',     // 濃いグレー（肉薄型）
            COLOR_ENEMY_SNIPER: '#aa00ff',     // パープル（遠距離型）
            COLOR_ENEMY_DOGFIGHTER: '#3366ff', // ブルー（ドッグファイト型）

            // 【経験値ジェム・成長システム設定】
            GEM_SIZE: 12,                 // 経験値ジェムのサイズ
            GEM_BASE_EXP: 20,             // ジェム1個あたりから獲得できる基本経験値量
            EXP_MAGNET_RADIUS: 150,       // 経験値を引き寄せる半径
            
            // --- α2追加仕様 ---
            MOTHERSHIP_X: 0,
            MOTHERSHIP_Y: 0,
            SPAWN_X: -500,
            SPAWN_Y: -1500,
            SPAWN_TRIGGER_Y: -500,
            MISSION_QUOTA: 10,
            BOOSTER_COOLDOWN: 180, // 3秒(60fps)
            MISSILE_COOLDOWN: 60,  // 1秒
            MISSILE_SPEED: 8,
            MISSILE_TURN_RATE: 0.1,
            GEM_MAGNET_BASE_SPEED: 8.0,   // ジェムがプレイヤーに吸引される時の初速
            GEM_MAGNET_ACCEL: 0.5,        // ジェムの毎フレームの吸引加速度（逃さず必ず回収するため）
            GEM_COLLECT_RADIUS: 20,       // ジェムを回収・獲得する自機との判定半径（ピクセル）
            LEVEL_UP_EXP_BASE: 100,       // レベル2に上がるために必要な基本経験値量
            LEVEL_UP_EXP_MULT: 1.3,       // レベルアップ毎の必要経験値の倍率上昇係数

            // 【アップグレード効果設定】
            UPGRADE_FIRERATE_MULT: 0.8,   // 「Rapid Fire」取得時の連射間隔短縮率（例: 0.8 = 連射速度20%アップ）
            UPGRADE_FIRERATE_MIN: 5,      // 連射速度の限界最小フレーム間隔（これ以上速くならないようにクランプ）
            UPGRADE_MOVESPEED_ADD: 0.2,   // 「Engine Boost」取得時の加速度加算値
            UPGRADE_MAXSPEED_ADD: 2.0,    // 「Engine Boost」取得時の最高速度加算値
            UPGRADE_HEAL_AMOUNT: 50,      // 「Hull Repair」取得時のHP回復量

            // 【当たり判定半径設定】
            COLLISION_ENEMY_BULLET: 20,   // 敵機とプレイヤーの弾が当たったと判定する円半径（ピクセル）
            COLLISION_ENEMY_PLAYER: 20,   // 敵機とプレイヤー自身が接触したと判定する円半径（ピクセル）

            // 【エフェクト・演出設定】
            FLASH_DURATION: 8,            // 被弾時の画面フラッシュ・敵の白フラッシュ時間（フレーム数）
            DEBRIS_SPEED_MULT: 5.0,       // 破片の飛び散る初速の最大値
            DEBRIS_LIFE: 300,             // 破片の生存フレーム数（約5秒）
            DEBRIS_SMOKE_COLOR: '#f80',   // デブリの煙パーティクルの色 (自機軌跡と同じオレンジ #f80)
            DEBRIS_SMOKE_SIZE: 3,         // デブリの煙パーティクルのサイズ (やや小さめの軌跡)
            DEBRIS_SMOKE_DECAY: 0.03,     // デブリの煙パーティクルの消失速度 (ややゆっくり消える)

            // 【爆発・破片ダメージ設定】
            DEBRIS_DAMAGE: 5,             // 爆破時に飛び散る有害破片のダメージ量
            EXPLOSION_DAMAGE: 15,         // 爆発のダメージ量
            EXPLOSION_RADIUS: 65,         // 爆発の最大当たり判定半径
            EXPLOSION_DURATION: 180,      // 爆発の寿命（フレーム数）※約3秒間維持
            DEBRIS_COUNT_MIN: 3,          // 撃破時に飛び散る有害破片の最小数
            DEBRIS_COUNT_MAX: 4,          // 撃破時に飛び散る有害破片の最大数

            // 【衝突物理・反動設定】
            COLLISION_RECOIL_RESTITUTION: 0.8, // 跳ね返りの弾性係数 (0.0 = 吸着, 1.0 = 完全弾性)
            COLLISION_DAMAGE_BASE: 3,          // 衝突時の基本最低ダメージ
            COLLISION_DAMAGE_VEL_MULT: 5.0,    // 衝突時の相対速度による追加ダメージ倍率

            STAR_LAYERS: [
                { rate: 0.2, size: 1, count: 150 }, // 遠景レイヤー（スクロール率、星の描画サイズ、描画個数）
                { rate: 0.5, size: 2, count: 100 }, // 中景レイヤー
                { rate: 0.8, size: 3, count: 50 }   // 近景レイヤー
            ],
            PARTICLE_SIZE: 3,             // スラスターから出るパーティクルの初期サイズ（半径）
            PARTICLE_DECAY: 0.008,        // パーティクルの毎フレームのフェードアウト速度（小さくすると長持ち）
            PARTICLE_VEL_MULT: 0.5,       // パーティクル生成時にプレイヤーの慣性速度を引き継ぐ割合（0.5 = 50%）
            PARTICLE_SPEED: 2.0,          // スラスター噴射炎の射出速度
            PARTICLE_SPREAD: 0.0,         // スラスター噴射炎のランダム拡散度（0で直進）
            COLOR_PARTICLE_PLAYER: '#fff',// 自機のスラスター噴射炎の色
            COLOR_PARTICLE_ENEMY: '#888', // 敵機のスラスター噴射炎の色
            RADAR_RADIUS: 200,            // 真円レーダーゲージの半径（ピクセル）
        };

        // ==========================================
        // 1. Phase 1: 描画基盤 (SpriteCache)
        // ==========================================
        const SpriteCache = {
            player: null,
            enemyRammer: null,
            enemySniper: null,
            enemyDogfighter: null,
            enemyFlash: null,
            bullet: null,
            enemyBullet: null,
            particlePlayer: null,
            particleEnemy: null,
            gem: null,
            debrisSmoke: null, // デブリの煙用キャッシュ

            init: function () {
                this.player = this.createShip('#0f0', CONFIG.PLAYER_SIZE_W, CONFIG.PLAYER_SIZE_H);  // 緑の自機
                this.enemyRammer = this.createShip(CONFIG.COLOR_ENEMY_RAMMER, CONFIG.ENEMY_SIZE_W, CONFIG.ENEMY_SIZE_H);   // 濃いグレー
                this.enemySniper = this.createShip(CONFIG.COLOR_ENEMY_SNIPER, CONFIG.ENEMY_SIZE_W, CONFIG.ENEMY_SIZE_H);   // パープル
                this.enemyDogfighter = this.createShip(CONFIG.COLOR_ENEMY_DOGFIGHTER, CONFIG.ENEMY_SIZE_W, CONFIG.ENEMY_SIZE_H); // ブルー
                this.enemyFlash = this.createShip('#fff', CONFIG.ENEMY_SIZE_W, CONFIG.ENEMY_SIZE_H, true); // 白のフラッシュ用敵機
                this.bullet = this.createCircle('#ff0', CONFIG.BULLET_SIZE);     // 黄色の自機ショット
                this.enemyBullet = this.createCircle('#f00', CONFIG.BULLET_SIZE); // 赤色の敵機ショット
                this.particlePlayer = this.createCircle(CONFIG.COLOR_PARTICLE_PLAYER, CONFIG.PARTICLE_SIZE);
                this.particleEnemy = this.createCircle(CONFIG.COLOR_PARTICLE_ENEMY, CONFIG.PARTICLE_SIZE);
                this.gem = this.createDiamond('#0ff', CONFIG.GEM_SIZE);      // シアンの経験値ジェム
                this.debrisSmoke = this.createCircle(CONFIG.DEBRIS_SMOKE_COLOR, CONFIG.DEBRIS_SMOKE_SIZE); // デブリの煙
            },

            createShip: function (color, w, h, isFlash = false) {
                const c = document.createElement('canvas');
                c.width = w; c.height = h;
                const ctx = c.getContext('2d');
                // ▲ 二等辺三角形の描画 (進行方向は右: x=w 側)
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(w, h / 2);      // 先端
                ctx.lineTo(0, 0);          // 左上
                ctx.lineTo(0, h);          // 左下
                ctx.closePath();
                ctx.fill();
                // ● キャノピー (進行方向付近の黒い円)
                if (!isFlash) {
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(w - 10, h / 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                return c;
            },

            createCircle: function (color, r) {
                const c = document.createElement('canvas');
                c.width = r * 2; c.height = r * 2;
                const ctx = c.getContext('2d');
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(r, r, r, 0, Math.PI * 2);
                ctx.fill();
                return c;
            },

            createDiamond: function (color, size) {
                const c = document.createElement('canvas');
                c.width = size; c.height = size;
                const ctx = c.getContext('2d');
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(size / 2, 0);
                ctx.lineTo(size, size / 2);
                ctx.lineTo(size / 2, size);
                ctx.lineTo(0, size / 2);
                ctx.closePath();
                ctx.fill();
                return c;
            }
        };

        // ==========================================
        // 1.5 Cielo 通信システム
        // ==========================================
        const Cielo = {
            element: null,
            queue: [],
            isPlaying: false,
            init: function() {
                this.element = document.getElementById('cielo-comm');
            },
            play: function(msg) {
                this.queue.push(msg);
                if (!this.isPlaying) {
                    this.next();
                }
            },
            next: function() {
                if (this.queue.length === 0) {
                    this.isPlaying = false;
                    this.element.style.opacity = 0;
                    return;
                }
                this.isPlaying = true;
                const msg = this.queue.shift();
                this.element.innerText = `＝　${msg}　＝`;
                this.element.style.opacity = 1;
                // 表示時間は文字数 x 1秒 (ただし最大5秒、最小2秒にクリップ)
                const duration = Math.max(2000, Math.min(5000, msg.length * 1000));
                setTimeout(() => {
                    this.element.style.opacity = 0;
                    setTimeout(() => this.next(), 300); // メッセージ間の余白
                }, duration);
            }
        };

        // ==========================================
        // 2. ゲーム状態・エンティティ定義
        // ==========================================
        const GAME = {
            state: 'PLAYING', // PLAYING, PAUSED, GAMEOVER
            width: window.innerWidth,
            height: window.innerHeight,
            mouseX: 0,
            mouseY: 0,
            isMouseDown: false, // 左クリック状態
            isPlayerDying: false,
            credits: 0,
            displayCredits: 0,
            killCount: 0,
            isMissionClear: false,
            damageFlashTimer: 0, // 画面の赤フラッシュ用タイマー
        };

        const keys = {};
        const mouse = { x: GAME.width / 2, y: GAME.height / 2, isDown: false };

        // 入力イベント
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', e => mouse.isDown = true);
        window.addEventListener('mouseup', e => mouse.isDown = false);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            GAME.width = canvas.width;
            GAME.height = canvas.height;
        });

        // Phase 5: 成長システムのデータ構造
        const playerStats = {
            level: 1,
            exp: 0,
            nextLevelExp: CONFIG.LEVEL_UP_EXP_BASE,
            fireRate: CONFIG.BULLET_BASE_FIRE_RATE,   // 連射速度（フレーム間隔）
            bulletCount: 1, // 同時発射数
            moveSpeed: CONFIG.PLAYER_BASE_MOVE_SPEED, // 加速度係数
            maxSpeed: CONFIG.PLAYER_BASE_MAX_SPEED,
            hp: CONFIG.PLAYER_BASE_HP,
            maxHp: CONFIG.PLAYER_BASE_HP,
            heat: 0, // 現在の熱量
            upgrades: {
                fireRate: 1,
                bulletCount: 1,
                moveSpeed: 1
            }
        };

        const upgradePool = [
            {
                id: 'fireRate',
                name: 'Rapid Fire',
                description: '連射速度がアップする',
                apply: () => {
                    playerStats.fireRate = Math.max(CONFIG.UPGRADE_FIRERATE_MIN, Math.floor(playerStats.fireRate * CONFIG.UPGRADE_FIRERATE_MULT));
                    playerStats.upgrades.fireRate++;
                }
            },
            {
                id: 'bulletCount',
                name: 'Multi-Shot',
                description: '同時発射弾数が増える',
                apply: () => {
                    playerStats.bulletCount++;
                    playerStats.upgrades.bulletCount++;
                }
            },
            {
                id: 'moveSpeed',
                name: 'Engine Boost',
                description: '機動力・最高速度がアップ',
                apply: () => {
                    playerStats.moveSpeed += CONFIG.UPGRADE_MOVESPEED_ADD;
                    playerStats.maxSpeed += CONFIG.UPGRADE_MAXSPEED_ADD;
                    playerStats.upgrades.moveSpeed++;
                }
            },
            {
                id: 'heal',
                name: 'Hull Repair',
                description: `HPを${CONFIG.UPGRADE_HEAL_AMOUNT}回復する`,
                apply: () => playerStats.hp = Math.min(playerStats.maxHp, playerStats.hp + CONFIG.UPGRADE_HEAL_AMOUNT)
            }
        ];

        const player = {
            x: 0, y: 0, vx: 0, vy: 0,
            bodyAngle: -Math.PI / 2, // 機体の向いている方向
            turretAngle: -Math.PI / 2, // 砲塔の向いている方向
            flashTimer: 0, // ダメージ時の白点滅用タイマー
            isInvincible: false, // 無敵状態フラグ
            invincibleTimer: 0,
            isOverheated: false,
            overheatTimer: 0,
            missileCooldown: 0,
            boosterCooldown: 0,
        };

        const entities = {
            enemies: [],
            bullets: [],
            enemyBullets: [],
            particles: [], // スラスターの軌跡や爆発用
            gems: [],      // 経験値ジェム
            missiles: [],  // プレイヤーのミサイル
            texts: []      // ダメージやレベルアップのポップアップテキスト
        };

        // Phase 3: 多重スクロール星背景 (Parallax Starfield)
        const stars = [];
        CONFIG.STAR_LAYERS.forEach(layer => {
            for (let i = 0; i < layer.count; i++) {
                stars.push({ x: Math.random() * GAME.width, y: Math.random() * GAME.height, layer: layer });
            }
        });

        // パーティクル（破片）生成関数 (通常被弾用・当たり判定なし)
        function spawnDebris(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * CONFIG.DEBRIS_SPEED_MULT + 1.0;
                entities.debris.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: color,
                    size: 2 + Math.random() * 2, // 2〜4pxの小さな破片
                    life: 1.0,
                    decay: 1.0 / 30, // 0.5秒で素早く消滅
                    harmful: false // 被弾時の破片はダメージなし
                });
            }
        }

        // 有害な破片の生成関数（爆破時に元の機体の慣性を引き継いで飛ぶ・当たり判定あり）
        function spawnDeathDebris(x, y, color, baseVx, baseVy) {
            // 数は設定値（DEBRIS_COUNT_MIN〜DEBRIS_COUNT_MAX）のランダム
            const count = CONFIG.DEBRIS_COUNT_MIN + Math.floor(Math.random() * (CONFIG.DEBRIS_COUNT_MAX - CONFIG.DEBRIS_COUNT_MIN + 1));
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2.0 + Math.random() * CONFIG.DEBRIS_SPEED_MULT;

                // デブリのサイズは自機サイズ（CONFIG.PLAYER_SIZE_W = 30）の 1/2 〜 1/3
                // すなわち、10px 〜 15px
                const size = CONFIG.PLAYER_SIZE_W / 3 + Math.random() * (CONFIG.PLAYER_SIZE_W / 2 - CONFIG.PLAYER_SIZE_W / 3);

                entities.debris.push({
                    x: x, y: y,
                    vx: baseVx * 0.5 + Math.cos(angle) * speed, // 慣性を50%引き継ぎつつ飛び散る
                    vy: baseVy * 0.5 + Math.sin(angle) * speed,
                    color: color,
                    size: size,
                    life: 1.0,
                    decay: 1.0 / CONFIG.DEBRIS_LIFE, // 5秒で消滅
                    harmful: true // 敵味方問わずダメージあり
                });
            }
        }

        // 爆発エフェクトの生成関数（敵味方にダメージを与える爆風）
        function spawnExplosion(x, y, isPlayer = false) {
            entities.explosions.push({
                x: x,
                y: y,
                maxRadius: CONFIG.EXPLOSION_RADIUS,
                timer: CONFIG.EXPLOSION_DURATION,
                maxTimer: CONFIG.EXPLOSION_DURATION,
                damagedEntities: new Set(), // 重複ダメージ防止用
                isPlayerExplosion: isPlayer
            });
        }

        function getEnemyColor(e) {
            if (e.personality === 'RAMMER') return CONFIG.COLOR_ENEMY_RAMMER;
            if (e.personality === 'SNIPER') return CONFIG.COLOR_ENEMY_SNIPER;
            return CONFIG.COLOR_ENEMY_DOGFIGHTER;
        }

        // 自機の爆破・死亡プロセス開始
        function triggerPlayerDeath() {
            if (GAME.isPlayerDying) return;
            GAME.isPlayerDying = true;

            // 自機の爆発
            spawnExplosion(player.x, player.y, true);

            // 自機の慣性を引き継いだ緑色の有害破片を撒き散らす
            spawnDeathDebris(player.x, player.y, '#0f0', player.vx, player.vy);
        }

        // ==========================================
        // 3. ゲームループとロジック
        // ==========================================
        function update() {
            if (GAME.state !== 'PLAYING') return;

            // --- Phase 2: 物理と操作 (Drift Physics) ---
            let ax = 0, ay = 0;
            if (!GAME.isPlayerDying) {
                if (keys['KeyW'] || keys['ArrowUp']) ay -= 1;
                if (keys['KeyS'] || keys['ArrowDown']) ay += 1;
                if (keys['KeyA'] || keys['ArrowLeft']) ax -= 1;
                if (keys['KeyD'] || keys['ArrowRight']) ax += 1;
            }

            // --- ブースター (SHIFT) ---
            if (!GAME.isPlayerDying && (keys['ShiftLeft'] || keys['ShiftRight']) && player.boosterCooldown <= 0 && !player.isOverheated) {
                player.boosterCooldown = CONFIG.BOOSTER_COOLDOWN;
                const boostSpeed = 15;
                const dot = player.vx * Math.cos(player.bodyAngle) + player.vy * Math.sin(player.bodyAngle);
                const orthoX = player.vx - dot * Math.cos(player.bodyAngle);
                const orthoY = player.vy - dot * Math.sin(player.bodyAngle);
                player.vx = dot * Math.cos(player.bodyAngle) + orthoX * 0.4 + Math.cos(player.bodyAngle) * boostSpeed;
                player.vy = dot * Math.sin(player.bodyAngle) + orthoY * 0.4 + Math.sin(player.bodyAngle) * boostSpeed;
                playerStats.heat = Math.min(CONFIG.HEAT_MAX, playerStats.heat + 30); // ヒート増加
                Cielo.play("ブースト全開ですね！");
            }
            if (player.boosterCooldown > 0) player.boosterCooldown--;

            if (ax !== 0 || ay !== 0) {
                player.bodyAngle = Math.atan2(ay, ax);
                player.vx += Math.cos(player.bodyAngle) * playerStats.moveSpeed;
                player.vy += Math.sin(player.bodyAngle) * playerStats.moveSpeed;
            }

            // Friction (摩擦係数)
            player.vx *= CONFIG.FRICTION;
            player.vy *= CONFIG.FRICTION;

            // Math.hypot を用いた速度クランプ
            const speed = Math.hypot(player.vx, player.vy);
            if (speed > playerStats.maxSpeed && player.boosterCooldown < CONFIG.BOOSTER_COOLDOWN - 30) {
                player.vx = (player.vx / speed) * playerStats.maxSpeed;
                player.vy = (player.vy / speed) * playerStats.maxSpeed;
            }

            player.x += player.vx;
            player.y += player.vy;

            // 最も近い敵を探索（自動エイム用）
            let nearestEnemy = null;
            let minDist = Infinity;
            for (let e of entities.enemies) {
                let d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d < minDist) {
                    minDist = d;
                    nearestEnemy = e;
                }
            }

            // 機体の回転 (マウス方向へ砲塔を向ける)
            const dxMouse = mouse.x - GAME.width / 2;
            const dyMouse = mouse.y - GAME.height / 2;
            player.turretAngle = Math.atan2(dyMouse, dxMouse);

            // --- Phase 3: スラスターパーティクル (慣性の継承と減衰) ---
            if (ax !== 0 || ay !== 0) {
                const emitX = player.x - Math.cos(player.bodyAngle) * (CONFIG.PLAYER_SIZE_W / 2);
                const emitY = player.y - Math.sin(player.bodyAngle) * (CONFIG.PLAYER_SIZE_W / 2);
                entities.particles.push({
                    x: emitX, y: emitY,
                    vx: player.vx * CONFIG.PARTICLE_VEL_MULT - Math.cos(player.bodyAngle) * CONFIG.PARTICLE_SPEED + (Math.random() - 0.5) * CONFIG.PARTICLE_SPREAD,
                    vy: player.vy * CONFIG.PARTICLE_VEL_MULT - Math.sin(player.bodyAngle) * CONFIG.PARTICLE_SPEED + (Math.random() - 0.5) * CONFIG.PARTICLE_SPREAD,
                    life: 1.0,
                    type: 'PLAYER_THRUSTER'
                });
            }

            // --- ヒートゲージ＆自動エイム射撃ロジック ---
            // ヒート管理のため、射撃は「左クリック or スペースキー」を押している間のみ作動（死亡時は撃てない）
            const isFiringInput = !GAME.isPlayerDying && (keys['Space'] || mouse.isDown);

            if (player.isOverheated) {
                player.overheatTimer--;
                playerStats.heat -= (CONFIG.HEAT_MAX / CONFIG.HEAT_OVERHEAT_PENALTY); // ペナルティ時間で0まで冷却
                if (player.overheatTimer <= 0) {
                    playerStats.heat = 0;
                    player.isOverheated = false;
                }
            } else {
                if (!isFiringInput) {
                    // 射撃していない時は自然冷却
                    playerStats.heat = Math.max(0, playerStats.heat - CONFIG.HEAT_COOL_RATE);
                }
            }

            if (isFiringInput && !player.isOverheated) {
                player.fireTimer++;
                if (player.fireTimer >= playerStats.fireRate) {
                    player.fireTimer = 0;
                    playerStats.heat += CONFIG.HEAT_PER_SHOT;

                    if (playerStats.heat >= CONFIG.HEAT_MAX) {
                        playerStats.heat = CONFIG.HEAT_MAX;
                        player.isOverheated = true;
                        player.overheatTimer = CONFIG.HEAT_OVERHEAT_PENALTY;
                    }

                    for (let i = 0; i < playerStats.bulletCount; i++) {
                        const spread = (i - (playerStats.bulletCount - 1) / 2) * CONFIG.BULLET_SPREAD_ANGLE;
                        entities.bullets.push({
                            x: player.x + Math.cos(player.turretAngle) * (CONFIG.PLAYER_SIZE_W / 2),
                            y: player.y + Math.sin(player.turretAngle) * (CONFIG.PLAYER_SIZE_W / 2),
                            vx: Math.cos(player.turretAngle + spread) * CONFIG.BULLET_SPEED + player.vx * 0.5,
                            vy: Math.sin(player.turretAngle + spread) * CONFIG.BULLET_SPEED + player.vy * 0.5,
                            life: CONFIG.BULLET_LIFE
                        });
                    }
                }
            } else if (!isFiringInput) {
                // 撃っていない間は次弾が即座に出るようにタイマーをリセットしておく
                player.fireTimer = playerStats.fireRate;
            }

            // --- ミサイル発射 (CTRL) ---
            if (!GAME.isPlayerDying && (keys['ControlLeft'] || keys['ControlRight']) && player.missileCooldown <= 0 && !player.isOverheated) {
                player.missileCooldown = CONFIG.MISSILE_COOLDOWN;
                
                // ロックオン処理 (前方90度)
                let target = null;
                let minDistToM = Infinity;
                entities.enemies.forEach(e => {
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.hypot(dx, dy);
                    const angleToEnemy = Math.atan2(dy, dx);
                    // 角度差を計算
                    let diff = Math.abs(angleToEnemy - player.turretAngle);
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    diff = Math.abs(diff);

                    if (diff < Math.PI / 4 && dist < 1200) {
                        if (dist < minDistToM) {
                            minDistToM = dist;
                            target = e;
                        }
                    }
                });
                
                entities.missiles.push({
                    x: player.x,
                    y: player.y,
                    vx: player.vx + Math.cos(player.turretAngle) * 5,
                    vy: player.vy + Math.sin(player.turretAngle) * 5,
                    angle: player.turretAngle,
                    target: target,
                    life: 300,
                    speed: CONFIG.MISSILE_SPEED,
                    turnRate: CONFIG.MISSILE_TURN_RATE
                });
                Cielo.play("ミサイル、いってらっしゃーい！");
            }
            if (player.missileCooldown > 0) player.missileCooldown--;

            // --- Phase 3: 多重スクロール背景座標更新 ---
            stars.forEach(s => {
                s.x -= player.vx * s.layer.rate;
                s.y -= player.vy * s.layer.rate;
                if (s.x < 0) s.x += GAME.width;
                if (s.x > GAME.width) s.x -= GAME.width;
                if (s.y < 0) s.y += GAME.height;
                if (s.y > GAME.height) s.y -= GAME.height;
            });

            // --- エンティティの更新 ---
            for (let i = entities.particles.length - 1; i >= 0; i--) {
                let p = entities.particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay || CONFIG.PARTICLE_DECAY;
                if (p.life <= 0) entities.particles.splice(i, 1);
            }

            // デブリ（破片）の更新と衝突判定
            for (let i = entities.debris.length - 1; i >= 0; i--) {
                let d = entities.debris[i];
                d.x += d.vx; d.y += d.vy;
                d.life -= d.decay;

                // 有害な破片が移動する際に後ろに煙パーティクル（軌跡）をはき出す
                if (d.harmful && d.life > 0.1 && Math.random() < 0.25) {
                    entities.particles.push({
                        x: d.x,
                        y: d.y,
                        // 進行方向と逆向きにゆっくり放出する
                        vx: -d.vx * 0.15 + (Math.random() - 0.5) * 0.4,
                        vy: -d.vy * 0.15 + (Math.random() - 0.5) * 0.4,
                        life: 0.6,
                        maxLife: 0.6, // 拡大フェードアウトの基準用
                        decay: CONFIG.DEBRIS_SMOKE_DECAY,
                        type: 'DEBRIS_SMOKE',
                        baseSize: d.size * 1.5 // デブリサイズの1.5倍
                    });
                }

                // 有害な爆発破片の当たり判定
                if (d.harmful && d.life > 0.1) {
                    // 自機への当たり判定
                    if (!GAME.isPlayerDying) {
                        const dx = player.x - d.x;
                        const dy = player.y - d.y;
                        const dist = Math.hypot(dx, dy);
                        const minDist = d.size / 2 + CONFIG.COLLISION_ENEMY_PLAYER / 2; // 自機半径とデブリ半径の合計
                        if (dist < minDist) {
                            // 重なり解消 (デブリ側を大きく押し戻し、自機は少しだけ押し戻す)
                            const overlap = minDist - dist;
                            const nx = dx / (dist || 1);
                            const ny = dy / (dist || 1);

                            d.x -= nx * overlap * 0.8;
                            d.y -= ny * overlap * 0.8;
                            player.x += nx * overlap * 0.2;
                            player.y += ny * overlap * 0.2;

                            // 相対速度による跳ね返り
                            const rvx = player.vx - d.vx;
                            const rvy = player.vy - d.vy;
                            const velAlongNormal = rvx * nx + rvy * ny;

                            if (velAlongNormal < 0) {
                                const crashSpeed = Math.hypot(rvx, rvy);
                                const restitution = CONFIG.COLLISION_RECOIL_RESTITUTION;

                                // 反動を適用 (デブリは大きく跳ね返り、自機はわずかに衝撃を受ける)
                                const dImpulse = (1 + restitution) * crashSpeed * 0.8 + 2.0;
                                const pImpulse = (1 + restitution) * crashSpeed * 0.2 + 0.5;

                                d.vx -= dImpulse * nx;
                                d.vy -= dImpulse * ny;
                                player.vx += pImpulse * nx;
                                player.vy += pImpulse * ny;

                                // 相対速度比例のダメージを適用
                                const damage = CONFIG.COLLISION_DAMAGE_BASE + crashSpeed * CONFIG.COLLISION_DAMAGE_VEL_MULT;
                                playerStats.hp -= damage;

                                // 被弾演出
                                GAME.damageFlashTimer = CONFIG.FLASH_DURATION;
                                spawnDebris((player.x + d.x) / 2, (player.y + d.y) / 2, '#0f0', 2);

                                // デブリは衝突により耐久力が削られ、少し寿命が減る
                                d.life -= 0.35;
                            }
                        }
                    }

                    // 敵機への当たり判定
                    let hitEnemy = false;
                    for (let j = entities.enemies.length - 1; j >= 0; j--) {
                        let e = entities.enemies[j];
                        const dx = e.x - d.x;
                        const dy = e.y - d.y;
                        const dist = Math.hypot(dx, dy);
                        const minDist = d.size / 2 + CONFIG.ENEMY_SIZE_W / 2;
                        if (dist < minDist) {
                            // 重なり解消
                            const overlap = minDist - dist;
                            const nx = dx / (dist || 1);
                            const ny = dy / (dist || 1);

                            d.x -= nx * overlap * 0.8;
                            d.y -= ny * overlap * 0.8;
                            e.x += nx * overlap * 0.2;
                            e.y += ny * overlap * 0.2;

                            // 相対速度による跳ね返り
                            const rvx = e.vx - d.vx;
                            const rvy = e.vy - d.vy;
                            const velAlongNormal = rvx * nx + rvy * ny;

                            if (velAlongNormal < 0) {
                                const crashSpeed = Math.hypot(rvx, rvy);
                                const restitution = CONFIG.COLLISION_RECOIL_RESTITUTION;

                                const dImpulse = (1 + restitution) * crashSpeed * 0.8 + 2.0;
                                const eImpulse = (1 + restitution) * crashSpeed * 0.2 + 0.5;

                                d.vx -= dImpulse * nx;
                                d.vy -= dImpulse * ny;
                                e.vx += eImpulse * nx;
                                e.vy += eImpulse * ny;

                                // ダメージ適用
                                const damage = CONFIG.COLLISION_DAMAGE_BASE + crashSpeed * CONFIG.COLLISION_DAMAGE_VEL_MULT;
                                e.hp -= damage;

                                // 被弾演出
                                e.flashTimer = CONFIG.FLASH_DURATION;
                                let enemyColor = getEnemyColor(e);
                                spawnDebris((e.x + d.x) / 2, (e.y + d.y) / 2, enemyColor, 2);

                                // デブリ寿命消費
                                d.life -= 0.35;
                                hitEnemy = true;
                                break;
                            }
                        }
                    }

                    if (d.life <= 0) {
                        entities.debris.splice(i, 1);
                        continue;
                    }
                }

                if (d.life <= 0) entities.debris.splice(i, 1);
            }

            // 爆発（爆風）の更新と当たり判定
            for (let i = entities.explosions.length - 1; i >= 0; i--) {
                let exp = entities.explosions[i];
                exp.timer--;

                const progress = 1 - (exp.timer / exp.maxTimer);

                // --- アニメ風の爆発推移計算 ---
                // 最初の10%で急拡大、中間80%は最大サイズを維持して震える、最後の10%で急縮小
                let scale = 1.0;
                let isShaking = false;
                if (progress < 0.1) {
                    scale = Math.sin((progress / 0.1) * (Math.PI / 2)); // Ease-out
                } else if (progress > 0.9) {
                    scale = Math.sin(((1.0 - progress) / 0.1) * (Math.PI / 2)); // Ease-in
                } else {
                    isShaking = true;
                    // 維持中は小刻みに震える
                    scale = 1.0 + (Math.random() - 0.5) * 0.15;
                }

                // 描画用の揺れオフセットもここで計算しておく（描画時に利用する）
                exp.shakeX = isShaking ? (Math.random() - 0.5) * 10 : 0;
                exp.shakeY = isShaking ? (Math.random() - 0.5) * 10 : 0;
                exp.currentScale = scale; // 描画側で使うために保存

                const currentRadius = exp.maxRadius * scale;

                // 爆発ダメージ判定 (最初の膨張フェーズのみダメージ判定を発生させる)
                if (progress > 0.02 && progress < 0.15) {
                    // 自機への爆風判定
                    if (!GAME.isPlayerDying && !exp.damagedEntities.has('player')) {
                        const distToPlayer = Math.hypot(player.x - exp.x, player.y - exp.y);
                        if (distToPlayer < currentRadius + CONFIG.PLAYER_SIZE_W / 2) {
                            playerStats.hp -= CONFIG.EXPLOSION_DAMAGE;
                            GAME.damageFlashTimer = CONFIG.FLASH_DURATION;
                            spawnDebris(player.x, player.y, '#0f0', 3);
                            exp.damagedEntities.add('player');
                        }
                    }

                    // 敵機への爆風判定
                    for (let j = entities.enemies.length - 1; j >= 0; j--) {
                        let e = entities.enemies[j];
                        if (!exp.damagedEntities.has(e)) {
                            const distToEnemy = Math.hypot(e.x - exp.x, e.y - exp.y);
                            if (distToEnemy < currentRadius + CONFIG.ENEMY_SIZE_W / 2) {
                                e.hp -= CONFIG.EXPLOSION_DAMAGE;
                                e.flashTimer = CONFIG.FLASH_DURATION;

                                let enemyColor = getEnemyColor(e);
                                spawnDebris(e.x, e.y, enemyColor, 3);
                                exp.damagedEntities.add(e);

                                if (e.hp <= 0) {
                                    // 連鎖誘発爆発！
                                    spawnExplosion(e.x, e.y);
                                    spawnDeathDebris(e.x, e.y, enemyColor, e.vx, e.vy);
                                    entities.gems.push({ x: e.x, y: e.y, exp: CONFIG.GEM_BASE_EXP, locked: false, speed: CONFIG.GEM_MAGNET_BASE_SPEED });
                                    entities.enemies.splice(j, 1);
                                }
                            }
                        }
                    }
                }

                if (exp.timer <= 0) {
                    // 自機の爆発が完全に消えたらゲームオーバーへ移行
                    if (exp.isPlayerExplosion) {
                        GAME.state = 'GAMEOVER';
                        document.getElementById('game-over-screen').style.display = 'block';
                    }
                    entities.explosions.splice(i, 1);
                }
            }

            // 自機の弾の更新
            for (let i = entities.bullets.length - 1; i >= 0; i--) {
                let b = entities.bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;
                if (b.life <= 0) entities.bullets.splice(i, 1);
            }

            // 敵の弾の更新と自機への衝突判定
            for (let i = entities.enemyBullets.length - 1; i >= 0; i--) {
                let b = entities.enemyBullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;

                if (Math.hypot(b.x - player.x, b.y - player.y) < CONFIG.COLLISION_ENEMY_PLAYER) {
                    playerStats.hp -= CONFIG.ENEMY_BULLET_DAMAGE;
                    entities.enemyBullets.splice(i, 1);

                    // 被弾演出（赤フラッシュ＆破片）
                    GAME.damageFlashTimer = CONFIG.FLASH_DURATION;
                    spawnDebris(player.x, player.y, '#0f0', 3 + Math.floor(Math.random() * 2));

                    if (playerStats.hp <= 0) {
                        triggerPlayerDeath();
                    }
                    continue;
                }

                if (b.life <= 0) entities.enemyBullets.splice(i, 1);
            }

            // --- ミサイル (Missiles) ---
            for (let i = entities.missiles.length - 1; i >= 0; i--) {
                let m = entities.missiles[i];
                if (m.target && !m.target.hp) m.target = null;
                if (m.target) {
                    const tx = m.target.x - m.x;
                    const ty = m.target.y - m.y;
                    let targetAngle = Math.atan2(ty, tx);
                    let diff = targetAngle - m.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    m.angle += Math.sign(diff) * Math.min(Math.abs(diff), m.turnRate);
                }
                m.vx += Math.cos(m.angle) * 0.5;
                m.vy += Math.sin(m.angle) * 0.5;
                const speed = Math.hypot(m.vx, m.vy);
                if (speed > m.speed) {
                    m.vx = (m.vx / speed) * m.speed;
                    m.vy = (m.vy / speed) * m.speed;
                }
                m.x += m.vx;
                m.y += m.vy;
                
                // パーティクル
                entities.particles.push({
                    x: m.x - Math.cos(m.angle) * 5, y: m.y - Math.sin(m.angle) * 5,
                    vx: m.vx * 0.5 + (Math.random()-0.5), vy: m.vy * 0.5 + (Math.random()-0.5),
                    life: 0.8, type: 'PLAYER_THRUSTER'
                });

                // 敵との当たり判定
                let hit = false;
                for (let j = entities.enemies.length - 1; j >= 0; j--) {
                    let e = entities.enemies[j];
                    if (Math.hypot(e.x - m.x, e.y - m.y) < CONFIG.ENEMY_SIZE_W) {
                        e.hp -= 30;
                        e.flashTimer = CONFIG.FLASH_DURATION;
                        spawnDebris(e.x, e.y, '#fff', 3);
                        hit = true;
                        break;
                    }
                }
                m.life--;
                if (hit || m.life <= 0) {
                    spawnExplosion(m.x, m.y, true);
                    entities.missiles.splice(i, 1);
                }
            }

            // --- Phase 4: 敵AIと衝突判定 ---
            // 敵のスポーン制御 (Y <= -500 でのみ湧く)
            if (entities.enemies.length < CONFIG.ENEMY_MAX_COUNT && Math.random() < CONFIG.ENEMY_SPAWN_BASE_RATE + (playerStats.level * CONFIG.ENEMY_SPAWN_LEVEL_MULT) && player.y <= CONFIG.SPAWN_TRIGGER_Y) {
                const spawnRadius = 300;
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * spawnRadius;
                const spawnX = CONFIG.SPAWN_X + Math.cos(angle) * dist;
                const spawnY = CONFIG.SPAWN_Y + Math.sin(angle) * dist;
                
                // 最初のスポーン時の通信
                if (GAME.killCount === 0 && entities.enemies.length === 0) {
                    const dx = spawnX - player.x;
                    const dy = spawnY - player.y;
                    let clockAngle = Math.atan2(dy, dx) - player.bodyAngle;
                    while (clockAngle < -Math.PI) clockAngle += Math.PI * 2;
                    while (clockAngle > Math.PI) clockAngle -= Math.PI * 2;
                    let oclock = Math.round((clockAngle + Math.PI/2) / (Math.PI/6));
                    if (oclock <= 0) oclock += 12;
                    Cielo.play(`${oclock}時にターゲット発見ですー！`);
                }

                // 性格の決定（CONFIGの設定確率に基づく）
                const totalChance = CONFIG.ENEMY_CHANCE_RAMMER + CONFIG.ENEMY_CHANCE_SNIPER + CONFIG.ENEMY_CHANCE_DOGFIGHTER;
                const rand = Math.random() * totalChance;
                let personality = 'DOGFIGHTER';
                if (rand < CONFIG.ENEMY_CHANCE_RAMMER) {
                    personality = 'RAMMER';
                } else if (rand < CONFIG.ENEMY_CHANCE_RAMMER + CONFIG.ENEMY_CHANCE_SNIPER) {
                    personality = 'SNIPER';
                } else {
                    personality = 'DOGFIGHTER';
                }

                const enemyMaxHp = CONFIG.ENEMY_BASE_HP + playerStats.level * CONFIG.ENEMY_HP_LEVEL_MULT;
                entities.enemies.push({
                    x: spawnX,
                    y: spawnY,
                    vx: 0, vy: 0, // 慣性移動用
                    hp: enemyMaxHp,
                    maxHp: enemyMaxHp,
                    flashTimer: 0,
                    heat: 0,
                    isOverheated: false,
                    overheatTimer: 0,
                    fireTimer: Math.floor(Math.random() * CONFIG.ENEMY_FIRE_RATE), // 射撃タイミングをばらけさせる
                    nextShootInterval: CONFIG.ENEMY_FIRE_RATE * (0.75 + Math.random() * 0.5), // 射撃間隔の揺らぎ初期値
                    personality: personality,
                    aimOffset: 0,
                    aimOffsetTimer: 0,
                    // ドッグファイト/すれ違い用の設定値
                    offsetX: 0,
                    offsetY: 0,
                    dogfightTimer: 0
                });
            }

            // --- 敵同士の衝突物理判定 (Enemy-Enemy Collision) ---
            for (let i = 0; i < entities.enemies.length; i++) {
                let e1 = entities.enemies[i];
                for (let j = i + 1; j < entities.enemies.length; j++) {
                    let e2 = entities.enemies[j];
                    const dx = e2.x - e1.x;
                    const dy = e2.y - e1.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = CONFIG.ENEMY_SIZE_W; // 30px
                    if (dist < minDist) {
                        // 重なり解消
                        const overlap = minDist - dist;
                        const nx = dx / (dist || 1);
                        const ny = dy / (dist || 1);
                        e1.x -= nx * overlap * 0.5;
                        e1.y -= ny * overlap * 0.5;
                        e2.x += nx * overlap * 0.5;
                        e2.y += ny * overlap * 0.5;

                        // 相対速度による跳ね返り計算
                        const rvx = e2.vx - e1.vx;
                        const rvy = e2.vy - e1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal < 0) {
                            const crashSpeed = Math.hypot(rvx, rvy);
                            const impulse = (1 + CONFIG.COLLISION_RECOIL_RESTITUTION) * crashSpeed * 0.5 + 1.2;

                            e1.vx -= impulse * nx;
                            e1.vy -= impulse * ny;
                            e2.vx += impulse * nx;
                            e2.vy += impulse * ny;

                            // 相対速度に基づくダメージ適用
                            const damage = CONFIG.COLLISION_DAMAGE_BASE + crashSpeed * CONFIG.COLLISION_DAMAGE_VEL_MULT;
                            e1.hp -= damage;
                            e2.hp -= damage;

                            e1.flashTimer = CONFIG.FLASH_DURATION;
                            e2.flashTimer = CONFIG.FLASH_DURATION;

                            // 接触火花デブリ
                            spawnDebris((e1.x + e2.x) / 2, (e1.y + e2.y) / 2, getEnemyColor(e1), 2);
                            spawnDebris((e1.x + e2.x) / 2, (e1.y + e2.y) / 2, getEnemyColor(e2), 2);
                        }
                    }
                }
            }

            for (let i = entities.enemies.length - 1; i >= 0; i--) {
                let e = entities.enemies[i];
                const edx = player.x - e.x;
                const edy = player.y - e.y;
                const distToPlayer = Math.hypot(edx, edy);

                // --- 1. 性格別ターゲット座標の設定 ---
                let targetX = player.x;
                let targetY = player.y;

                if (e.personality === 'RAMMER') {
                    // とにかくプレイヤーに直行・体当たり
                    targetX = player.x;
                    targetY = player.y;
                } else if (e.personality === 'SNIPER') {
                    // 一定の遠距離（約350px）を維持する
                    const keepDist = 350;
                    if (distToPlayer < keepDist - 50) {
                        // 近すぎるので離れる方向へ加速
                        targetX = e.x - (edx / distToPlayer) * 200;
                        targetY = e.y - (edy / distToPlayer) * 200;
                    } else if (distToPlayer > keepDist + 50) {
                        // 遠すぎるので近づく
                        targetX = player.x;
                        targetY = player.y;
                    } else {
                        // 距離がちょうどいい時はプレイヤーの周りを周回移動（横滑り）
                        targetX = player.x + (edy / distToPlayer) * keepDist;
                        targetY = player.y - (edx / distToPlayer) * keepDist;
                    }
                } else if (e.personality === 'DOGFIGHTER') {
                    // すれ違いドッグファイト
                    // ターゲット位置をプレイヤーから一定オフセットさせ、定期的に更新する
                    if (!e.dogfightTimer || e.dogfightTimer <= 0 || distToPlayer < 100) {
                        const offsetAngle = Math.random() * Math.PI * 2;
                        const offsetDist = 120 + Math.random() * 120; // プレイヤーの周囲120〜240px
                        e.offsetX = Math.cos(offsetAngle) * offsetDist;
                        e.offsetY = Math.sin(offsetAngle) * offsetDist;
                        e.dogfightTimer = 100 + Math.floor(Math.random() * 60); // 定期的に次の通過ポイントを設定
                    }
                    e.dogfightTimer--;

                    targetX = player.x + e.offsetX;
                    targetY = player.y + e.offsetY;
                }

                // --- 2. 進行方向の障害物（他の敵・プレイヤー・有害デブリ・爆発）の回避 (Obstacle Avoidance) ---
                let avoidX = 0;
                let avoidY = 0;
                const eSpeed = Math.hypot(e.vx, e.vy);
                const accel = e.personality === 'RAMMER' ? CONFIG.ENEMY_ACCEL * 1.3 : CONFIG.ENEMY_ACCEL;

                if (eSpeed > 0.2) {
                    const dirX = e.vx / eSpeed;
                    const dirY = e.vy / eSpeed;
                    const lookAheadDist = CONFIG.ENEMY_SIZE_W * 2.8; // 約84px先を予測
                    const predictX = e.x + dirX * lookAheadDist;
                    const predictY = e.y + dirY * lookAheadDist;

                    let mostThreatening = null;
                    let minThreatDist = lookAheadDist;

                    // プレイヤーを障害物として検知 (自爆型RAMMERはプレイヤーを避けない)
                    if (!GAME.isPlayerDying && e.personality !== 'RAMMER') {
                        const distToPlayer = Math.hypot(player.x - predictX, player.y - predictY);
                        if (distToPlayer < CONFIG.ENEMY_SIZE_W * 1.5) {
                            mostThreatening = player;
                            minThreatDist = distToPlayer;
                        }
                    }

                    // 他の敵機を障害物として検知
                    entities.enemies.forEach(other => {
                        if (other === e) return;
                        const distToOther = Math.hypot(other.x - predictX, other.y - predictY);
                        if (distToOther < CONFIG.ENEMY_SIZE_W * 1.3) {
                            if (distToOther < minThreatDist) {
                                mostThreatening = other;
                                minThreatDist = distToOther;
                            }
                        }
                    });

                    // 有害デブリを障害物として検知
                    entities.debris.forEach(d => {
                        if (!d.harmful) return; // 無害な被弾火花は避けない
                        const distToDebris = Math.hypot(d.x - predictX, d.y - predictY);
                        if (distToDebris < d.size / 2 + CONFIG.ENEMY_SIZE_W * 1.3) {
                            if (distToDebris < minThreatDist) {
                                mostThreatening = d;
                                minThreatDist = distToDebris;
                            }
                        }
                    });

                    // 爆発を危険オブジェとして検知
                    entities.explosions.forEach(exp => {
                        const distToExplosion = Math.hypot(exp.x - predictX, exp.y - predictY);
                        // 爆発の現在半径を取得（事前にupdate計算済みのcurrentScaleを利用）
                        const currentRadius = exp.maxRadius * (exp.currentScale || 1.0);

                        if (distToExplosion < currentRadius + CONFIG.ENEMY_SIZE_W * 1.5) {
                            // 爆発は他より脅威度が高い（距離を小さく見積もり、優先的に回避させる）
                            const effectiveDist = distToExplosion * 0.4;
                            if (effectiveDist < minThreatDist) {
                                mostThreatening = exp;
                                minThreatDist = effectiveDist;
                            }
                        }
                    });

                    // 回避ステアリング力の計算
                    if (mostThreatening) {
                        const relX = mostThreatening.x - e.x;
                        const relY = mostThreatening.y - e.y;
                        const crossProduct = dirX * relY - dirY * relX;

                        // 左右に避ける直交ベクトルを生成 (外積の符号と逆向きに操舵)
                        const steerSide = crossProduct > 0 ? -1 : 1;
                        const steerX = -dirY * steerSide;
                        const steerY = dirX * steerSide;

                        // 障害物に近づくほど強い回避力を適用
                        const avoidForce = (1.0 - minThreatDist / lookAheadDist) * accel * 2.5;
                        avoidX = steerX * avoidForce;
                        avoidY = steerY * avoidForce;
                    }
                }

                // --- 3. 移動角度と慣性移動 ---
                const moveAngle = Math.atan2(targetY - e.y, targetX - e.x);

                let maxSpd = CONFIG.ENEMY_MAX_SPEED;
                if (e.personality === 'RAMMER') maxSpd *= 1.25;
                if (e.personality === 'SNIPER') maxSpd *= 0.85;

                e.vx += Math.cos(moveAngle) * accel + avoidX;
                e.vy += Math.sin(moveAngle) * accel + avoidY;

                e.vx *= CONFIG.FRICTION;
                e.vy *= CONFIG.FRICTION;

                const enemySpeed = Math.hypot(e.vx, e.vy);
                if (enemySpeed > maxSpd) {
                    e.vx = (e.vx / enemySpeed) * maxSpd;
                    e.vy = (e.vy / enemySpeed) * maxSpd;
                }

                e.x += e.vx;
                e.y += e.vy;

                // --- 3. 機体の向き（エイム）と揺らぎの適用 ---
                // 照準角度に数秒ごとに変わる微小な揺らぎ（aimOffset）を加え、射撃が単一線上に重ならないようにする
                if (!e.aimOffsetTimer || e.aimOffsetTimer <= 0) {
                    e.aimOffset = (Math.random() - 0.5) * 0.35; // 約±10度以内の揺らぎ
                    e.aimOffsetTimer = 30 + Math.floor(Math.random() * 45);
                }
                e.aimOffsetTimer--;

                e.angle = Math.atan2(edy, edx) + e.aimOffset;

                // 敵のスラスターパーティクル (プレイヤーより控えめに発生)
                if (Math.random() < 0.3) {
                    const emitX = e.x - Math.cos(e.angle) * (CONFIG.ENEMY_SIZE_W / 2);
                    const emitY = e.y - Math.sin(e.angle) * (CONFIG.ENEMY_SIZE_W / 2);
                    entities.particles.push({
                        x: emitX, y: emitY,
                        vx: e.vx * CONFIG.PARTICLE_VEL_MULT - Math.cos(e.angle) * CONFIG.PARTICLE_SPEED + (Math.random() - 0.5) * CONFIG.PARTICLE_SPREAD,
                        vy: e.vy * CONFIG.PARTICLE_VEL_MULT - Math.sin(e.angle) * CONFIG.PARTICLE_SPEED + (Math.random() - 0.5) * CONFIG.PARTICLE_SPREAD,
                        life: 0.8,
                        type: 'ENEMY_THRUSTER'
                    });
                }

                // --- 4. 射撃処理とヒートゲージ管理（揺らぎを持たせる） ---
                if (e.isOverheated) {
                    e.overheatTimer--;
                    e.heat -= (CONFIG.HEAT_MAX / CONFIG.HEAT_OVERHEAT_PENALTY);
                    if (e.overheatTimer <= 0) {
                        e.heat = 0;
                        e.isOverheated = false;
                    }
                } else {
                    // プレイヤーが生きており、かつ射程内にいる場合のみ射撃
                    if (!GAME.isPlayerDying && distToPlayer < 800) {
                        e.fireTimer++;
                        // 揺らいだ射撃間隔(nextShootInterval)に達したか判定
                        if (e.fireTimer >= e.nextShootInterval) {
                            e.fireTimer = 0;
                            e.heat += CONFIG.HEAT_PER_SHOT;

                            // 次回の射撃間隔をランダムに揺らす（ENEMY_FIRE_RATEの75%〜125%）
                            e.nextShootInterval = CONFIG.ENEMY_FIRE_RATE * (0.75 + Math.random() * 0.5);

                            if (e.heat >= CONFIG.HEAT_MAX) {
                                e.heat = CONFIG.HEAT_MAX;
                                e.isOverheated = true;
                                e.overheatTimer = CONFIG.HEAT_OVERHEAT_PENALTY;
                            }

                            // 敵の弾を発射（照準の揺らぎを反映したe.angleを使用）
                            entities.enemyBullets.push({
                                x: e.x + Math.cos(e.angle) * (CONFIG.ENEMY_SIZE_W / 2),
                                y: e.y + Math.sin(e.angle) * (CONFIG.ENEMY_SIZE_W / 2),
                                vx: Math.cos(e.angle) * CONFIG.ENEMY_BULLET_SPEED + e.vx * 0.5,
                                vy: Math.sin(e.angle) * CONFIG.ENEMY_BULLET_SPEED + e.vy * 0.5,
                                life: CONFIG.BULLET_LIFE
                            });
                        }
                    } else {
                        e.heat = Math.max(0, e.heat - CONFIG.HEAT_COOL_RATE);
                    }
                }

                if (e.flashTimer > 0) e.flashTimer--;

                // 自機の弾と敵機の衝突判定
                let hit = false;
                for (let j = entities.bullets.length - 1; j >= 0; j--) {
                    let b = entities.bullets[j];
                    if (Math.hypot(e.x - b.x, e.y - b.y) < CONFIG.COLLISION_ENEMY_BULLET) {
                        e.hp -= CONFIG.BULLET_DAMAGE;
                        entities.bullets.splice(j, 1);

                        // 攻撃ヒット演出（白フラッシュ＆破片）
                        e.flashTimer = CONFIG.FLASH_DURATION;

                        // 敵の性格色に合わせたデブリを生成
                        let enemyColor = CONFIG.COLOR_ENEMY_DOGFIGHTER;
                        if (e.personality === 'RAMMER') enemyColor = CONFIG.COLOR_ENEMY_RAMMER;
                        if (e.personality === 'SNIPER') enemyColor = CONFIG.COLOR_ENEMY_SNIPER;

                        spawnDebris(e.x, e.y, enemyColor, 3 + Math.floor(Math.random() * 2));

                        if (e.hp <= 0) {
                            // 敵撃破時の爆発と有害破片の発生
                            spawnExplosion(e.x, e.y);
                            spawnDeathDebris(e.x, e.y, enemyColor, e.vx, e.vy);

                            entities.gems.push({ x: e.x, y: e.y, exp: CONFIG.GEM_BASE_EXP, locked: false, speed: CONFIG.GEM_MAGNET_BASE_SPEED });
                            entities.enemies.splice(i, 1);
                            hit = true;
                            break;
                        }
                    }
                }
                if (hit) continue;

                // 敵機本体と自機の物理衝突判定
                if (!GAME.isPlayerDying) {
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = CONFIG.COLLISION_ENEMY_PLAYER; // 20px
                    if (dist < minDist) {
                        // 重なり解消
                        const overlap = minDist - dist;
                        const nx = dx / (dist || 1);
                        const ny = dy / (dist || 1);

                        // 自機と敵機を押し離す
                        player.x -= nx * overlap * 0.5;
                        player.y -= ny * overlap * 0.5;
                        e.x += nx * overlap * 0.5;
                        e.y += ny * overlap * 0.5;

                        // 相対速度による反動
                        const rvx = e.vx - player.vx;
                        const rvy = e.vy - player.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal < 0) {
                            const crashSpeed = Math.hypot(rvx, rvy); // 相対速度の大きさ
                            const restitution = CONFIG.COLLISION_RECOIL_RESTITUTION;
                            const impulse = (1 + restitution) * crashSpeed * 0.5 + 2.0; // 自機衝突はより強い反動に

                            player.vx -= impulse * nx;
                            player.vy -= impulse * ny;
                            e.vx += impulse * nx;
                            e.vy += impulse * ny;

                            // ダメージ計算（相対速度比例）
                            const damage = CONFIG.COLLISION_DAMAGE_BASE + crashSpeed * CONFIG.COLLISION_DAMAGE_VEL_MULT;
                            playerStats.hp -= damage;
                            e.hp -= damage;

                            GAME.damageFlashTimer = CONFIG.FLASH_DURATION;
                            e.flashTimer = CONFIG.FLASH_DURATION;

                            let enemyColor = getEnemyColor(e);
                            spawnDebris((player.x + e.x) / 2, (player.y + e.y) / 2, '#0f0', 3);
                            spawnDebris((player.x + e.x) / 2, (player.y + e.y) / 2, enemyColor, 3);
                        }
                    }
                }

                // 生存チェック（衝突等でHPが0になった場合の一括処理）
                if (e.hp <= 0) {
                    let enemyColor = getEnemyColor(e);
                    spawnExplosion(e.x, e.y);
                    spawnDeathDebris(e.x, e.y, enemyColor, e.vx, e.vy);
                    entities.gems.push({ x: e.x, y: e.y, exp: CONFIG.GEM_BASE_EXP, locked: false, speed: CONFIG.GEM_MAGNET_BASE_SPEED });
                    
                    GAME.credits += 100;
                    GAME.killCount++;
                    if (GAME.killCount === CONFIG.MISSION_QUOTA) {
                        Cielo.play("ノルマ達成ですー、無理せず帰ってきてくださいね");
                    }
                    
                    entities.enemies.splice(i, 1);
                    continue;
                }
            }

            // --- Phase 5: 成長要素 (ジェム回収) ---
            for (let i = entities.gems.length - 1; i >= 0; i--) {
                let g = entities.gems[i];
                const gdx = player.x - g.x;
                const gdy = player.y - g.y;
                const dist = Math.hypot(gdx, gdy);

                // 一度吸引範囲に入ったらロックオン状態になり、加速度がついて必ず回収できる
                if (dist < CONFIG.EXP_MAGNET_RADIUS) {
                    g.locked = true;
                }

                if (g.locked) {
                    g.speed += CONFIG.GEM_MAGNET_ACCEL; // 加速度を加算
                    g.x += (gdx / dist) * g.speed;
                    g.y += (gdy / dist) * g.speed;
                }

                if (dist < CONFIG.GEM_COLLECT_RADIUS) {
                    playerStats.exp += g.exp;
                    entities.gems.splice(i, 1);
                    checkLevelUp();
                }
            }

            // --- 母艦着艦・ミッションクリア判定 ---
            if (GAME.killCount >= CONFIG.MISSION_QUOTA && !GAME.isMissionClear && !GAME.isPlayerDying) {
                const mw = CONFIG.PLAYER_SIZE_W; // カタパルト幅 (判定用)
                const mh = mw;
                if (Math.abs(player.x - CONFIG.MOTHERSHIP_X) < mw && Math.abs(player.y - CONFIG.MOTHERSHIP_Y) < mh) {
                    if (Math.hypot(player.vx, player.vy) <= 5) {
                        // 着艦成功
                        GAME.isMissionClear = true;
                        Cielo.play("おかえりなさい、お疲れ様でした！");
                        setTimeout(() => {
                            GAME.state = 'GAMEOVER';
                            document.getElementById('game-over-screen').style.display = 'block';
                            document.querySelector('#game-over-screen h2').innerText = 'MISSION CLEAR';
                            document.querySelector('#game-over-screen h2').style.color = '#0ff';
                        }, 2000);
                    }
                }
            }
            
            // クレジットのカウントアップ演出
            if (GAME.displayCredits < GAME.credits) {
                GAME.displayCredits += 5;
                if (GAME.displayCredits > GAME.credits) GAME.displayCredits = GAME.credits;
            }
            document.getElementById('ui-credits').innerText = GAME.displayCredits;

            // HP20%以下の通信
            if (playerStats.hp > 0 && playerStats.hp <= playerStats.maxHp * 0.2 && !player._hpWarningPlayed) {
                player._hpWarningPlayed = true;
                Cielo.play("無理しないで、帰還してください！");
            } else if (playerStats.hp > playerStats.maxHp * 0.2) {
                player._hpWarningPlayed = false;
            }

            // 万が一の自機HPゼロ判定のセーフガード
            if (playerStats.hp <= 0 && !GAME.isPlayerDying) {
                triggerPlayerDeath();
            }

            updateHUD();
        }

        function checkLevelUp() {
            if (playerStats.exp >= playerStats.nextLevelExp) {
                playerStats.level++;
                playerStats.exp -= playerStats.nextLevelExp;
                playerStats.nextLevelExp = Math.floor(playerStats.nextLevelExp * CONFIG.LEVEL_UP_EXP_MULT);

                GAME.state = 'PAUSED';

                const screen = document.getElementById('level-up-screen');
                const optionsContainer = document.getElementById('upgrade-options');
                optionsContainer.innerHTML = '';

                let available = [...upgradePool];
                for (let i = 0; i < 3 && available.length > 0; i++) {
                    const idx = Math.floor(Math.random() * available.length);
                    const upgrade = available.splice(idx, 1)[0];

                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `<h3>${upgrade.name}</h3><p>${upgrade.description}</p>`;
                    card.onclick = () => {
                        upgrade.apply();
                        screen.style.display = 'none';
                        GAME.state = 'PLAYING';
                    };
                    optionsContainer.appendChild(card);
                }
                screen.style.display = 'flex';
            }
        }

        function updateHUD() {
            document.getElementById('ui-level').innerText = playerStats.level;
            document.getElementById('ui-exp').innerText = playerStats.exp;
            document.getElementById('ui-next-exp').innerText = playerStats.nextLevelExp;
            document.getElementById('ui-hp').innerText = Math.floor(playerStats.hp);

            // 右下 Stats Panel 更新
            const shotsPerSec = (60 / playerStats.fireRate).toFixed(1);

            const statsHtml = `
                <div class="stat-category">
                    <div class="stat-category-title">// HULL</div>
                    <div class="stat-row"><span class="stat-label">INTEGRITY</span><span class="stat-value">Lv${playerStats.level} ${Math.floor(playerStats.hp)}/${playerStats.maxHp}</span></div>
                    <div class="stat-row"><span class="stat-label">PHY. RESIST</span><span class="stat-value">Lv1 100</span></div>
                    <div class="stat-row"><span class="stat-label">HEAT RESIST</span><span class="stat-value">Lv1 100</span></div>
                    <div class="stat-row"><span class="stat-label">EXP. RESIST</span><span class="stat-value">Lv1 100</span></div>
                    <div class="stat-row"><span class="stat-label">HEAT CAP.</span><span class="stat-value">Lv1 ${CONFIG.HEAT_MAX}</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// VULCAN</div>
                    <div class="stat-row"><span class="stat-label">PROJECTILES</span><span class="stat-value">Lv${playerStats.upgrades.bulletCount} ${playerStats.bulletCount}</span></div>
                    <div class="stat-row"><span class="stat-label">FIRE RATE</span><span class="stat-value">Lv${playerStats.upgrades.fireRate} ${shotsPerSec}/s</span></div>
                    <div class="stat-row"><span class="stat-label">HEAT EFF.</span><span class="stat-value">Lv1 100</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// THRUSTER</div>
                    <div class="stat-row"><span class="stat-label">MAX SPEED</span><span class="stat-value">Lv${playerStats.upgrades.moveSpeed} ${(playerStats.maxSpeed).toFixed(1)}</span></div>
                    <div class="stat-row"><span class="stat-label">ACCEL</span><span class="stat-value">Lv${playerStats.upgrades.moveSpeed} ${(playerStats.moveSpeed).toFixed(2)}</span></div>
                    <div class="stat-row"><span class="stat-label">HANDLING</span><span class="stat-value">Lv1 100</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// SHIELD SYS</div>
                    <div class="stat-row"><span class="stat-label">ENERGY</span><span class="stat-value">Lv1 100/100</span></div>
                    <div class="stat-row"><span class="stat-label">STRENGTH</span><span class="stat-value">Lv1 100</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// ANCHOR GARAGE</div>
                    <div class="stat-row"><span class="stat-label">HULL INTEGRITY</span><span class="stat-value">Lv1 1000/1000</span></div>
                </div>
            `;
            document.getElementById('stats-panel').innerHTML = statsHtml;
        }

        // ==========================================
        // 5. 描画フェーズ (Rendering)
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = GAME.width;
        canvas.height = GAME.height;

        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, GAME.width, GAME.height);

            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = s.layer.rate;
                ctx.fillRect(s.x, s.y, s.layer.size, s.layer.size);
            });
            ctx.globalAlpha = 1.0;

            ctx.save();
            ctx.translate(GAME.width / 2 - player.x, GAME.height / 2 - player.y);

            // --- 母艦 (Anchor Garage) 描画 ---
            ctx.save();
            ctx.translate(CONFIG.MOTHERSHIP_X, CONFIG.MOTHERSHIP_Y);
            // 上向きなので -PI/2
            ctx.rotate(-Math.PI / 2);
            // コア
            ctx.fillStyle = '#112233';
            ctx.fillRect(-100, -80, 200, 160);
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(-100, -80, 200, 160);
            // モジュール
            ctx.fillStyle = '#223344';
            ctx.fillRect(-60, -120, 120, 40);
            ctx.fillRect(-60, 80, 120, 40);
            ctx.strokeRect(-60, -120, 120, 40);
            ctx.strokeRect(-60, 80, 120, 40);
            // 発着カタパルト (幅は CONFIG.PLAYER_SIZE_W)
            ctx.fillStyle = '#334455';
            const catW = 150;
            const catH = CONFIG.PLAYER_SIZE_W;
            ctx.fillRect(100, -catH / 2, catW, catH);
            // カタパルト上のライン
            ctx.strokeStyle = '#ff0';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(100, 0);
            ctx.lineTo(100 + catW, 0);
            ctx.stroke();
            ctx.setLineDash([]);
            // 発光部
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(0, 0, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            entities.gems.forEach(g => {
                ctx.drawImage(SpriteCache.gem, g.x - SpriteCache.gem.width / 2, g.y - SpriteCache.gem.height / 2);
            });

            entities.particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                if (p.type === 'DEBRIS_SMOKE') {
                    // 半透明の煙（灰色の●で表現、拡大しながら薄れて消える）
                    const progress = 1.0 - (p.life / p.maxLife); // 0.0 〜 1.0
                    const scale = 1.0 + progress * 1.0; // 1倍から2倍へ拡大
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = '#888'; // 灰色
                    ctx.beginPath();
                    ctx.arc(0, 0, p.baseSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'ENEMY_THRUSTER') {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.drawImage(SpriteCache.particleEnemy, -SpriteCache.particleEnemy.width / 2, -SpriteCache.particleEnemy.height / 2);
                } else {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.drawImage(SpriteCache.particlePlayer, -SpriteCache.particlePlayer.width / 2, -SpriteCache.particlePlayer.height / 2);
                }
                ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            // デブリ（破片）の描画（最後の30%でフェードアウト）
            entities.debris.forEach(d => {
                ctx.fillStyle = d.color;
                ctx.globalAlpha = Math.min(1.0, d.life / 0.3);
                ctx.fillRect(d.x - d.size / 2, d.y - d.size / 2, d.size, d.size);
            });
            ctx.globalAlpha = 1.0;

            // 敵の弾描画
            entities.enemyBullets.forEach(b => {
                ctx.drawImage(SpriteCache.enemyBullet, b.x - SpriteCache.enemyBullet.width / 2, b.y - SpriteCache.enemyBullet.height / 2);
            });

            // 自機の弾描画
            entities.bullets.forEach(b => {
                ctx.drawImage(SpriteCache.bullet, b.x - SpriteCache.bullet.width / 2, b.y - SpriteCache.bullet.height / 2);
            });

            // 敵機描画
            entities.enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);

                // 敵のHPゲージ・ヒートゲージ (機体の下に回転せず描画)
                const barW = 30;
                // 上段：HPゲージ
                const hpRatio = Math.max(0, e.hp / e.maxHp);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(-barW / 2, 22, barW, 3);
                ctx.fillStyle = hpRatio <= 0.2 ? '#f00' : '#0f0';
                ctx.fillRect(-barW / 2, 22, barW * hpRatio, 3);

                // 下段：ヒートゲージ
                if (e.heat > 0) {
                    const heatRatio = Math.max(0, Math.min(1, e.heat / CONFIG.HEAT_MAX));
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(-barW / 2, 26, barW, 3);
                    if (e.isOverheated) {
                        ctx.fillStyle = '#808080';
                    } else if (heatRatio > 0.8) {
                        ctx.fillStyle = '#f80';
                    } else {
                        ctx.fillStyle = '#fff';
                    }
