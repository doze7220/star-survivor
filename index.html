<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARDRIFTER - v0.5.00</title>
    <link rel="stylesheet" href="style.css">
    <script>
        window.addEventListener('error', function (e) {
            const errDiv = document.createElement('div');
            errDiv.style = 'position:fixed; top:10px; left:10px; z-index:99999; background:rgba(255,0,0,0.8); color:#fff; padding:15px; pointer-events:none; font-family:monospace; white-space:pre-wrap; border: 2px solid #fff; border-radius: 5px;';
            errDiv.innerText = '【CRITICAL ERROR】\n' + e.message + '\n\n発生行: ' + e.lineno + '行目付近\n' + (e.filename || '');
            document.body.appendChild(errDiv);
        });
    </script>
</head>

<body>

    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="credits-panel" style="display: none;">BOUNTY: <span id="ui-credits">0</span> c</div>
        <div id="cielo-comm" style="display: none;"></div>
        <div id="keybind-panel">W/S:前進・後退 A/D:左右旋回
            RClick&Space:バルカン E:ミサイル Shift:ブースト
            C:通信 X:エイム切替 Q:タクティカル・ブレーキ
            DEBUG - 1:HP全快 2:リスポーン切替 3:敵全滅 4:ミッション強制クリア 5:レベルアップ 6:敵母艦破壊</div>

        <div id="stats-panel" style="display: none;"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>
