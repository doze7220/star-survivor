            } else if (playerStats.hp > playerStats.maxHp * 0.2) {
                player._hpWarningPlayed = false;
            }

            // 万が一の自機HPゼロ判定のセーフガード
            if (playerStats.hp <= 0 && !GAME.isPlayerDying) {
                triggerPlayerDeath();
            }

            // --- Update Engine Trails ---
            if (!GAME.isPlayerDying) {
                const isBoosterActive = GAME.launchSequence || (player.boosterCooldown > CONFIG.BOOSTER_COOLDOWN - 30);
                const isThrusting = (keys['KeyW'] || keys['ArrowUp'] || keys['KeyS'] || keys['ArrowDown'] ||
                    keys['KeyA'] || keys['ArrowLeft'] || keys['KeyD'] || keys['ArrowRight'] ||
                    isBoosterActive);

                const backX = player.x - Math.cos(player.bodyAngle) * (CONFIG.PLAYER_SIZE_H / 2);
                const backY = player.y - Math.sin(player.bodyAngle) * (CONFIG.PLAYER_SIZE_H / 2);
                const perpX = Math.cos(player.bodyAngle + Math.PI / 2);
                const perpY = Math.sin(player.bodyAngle + Math.PI / 2);
                const offsetDist = 5; // Tomcat twin nozzle offset

                const leftNozzleX = backX - perpX * offsetDist;
                const leftNozzleY = backY - perpY * offsetDist;
                const rightNozzleX = backX + perpX * offsetDist;
                const rightNozzleY = backY + perpY * offsetDist;

                if (!player.leftTrailHistory) player.leftTrailHistory = [];
                if (!player.rightTrailHistory) player.rightTrailHistory = [];

                player.leftTrailHistory.push({ x: leftNozzleX, y: leftNozzleY, active: isThrusting, boost: isBoosterActive });
                player.rightTrailHistory.push({ x: rightNozzleX, y: rightNozzleY, active: isThrusting, boost: isBoosterActive });

                const maxPlayerTrailLen = 25;
                if (player.leftTrailHistory.length > maxPlayerTrailLen) player.leftTrailHistory.shift();
                if (player.rightTrailHistory.length > maxPlayerTrailLen) player.rightTrailHistory.shift();
            } else {
                if (player.leftTrailHistory && player.leftTrailHistory.length > 0) player.leftTrailHistory.shift();
                if (player.rightTrailHistory && player.rightTrailHistory.length > 0) player.rightTrailHistory.shift();
            }

            // Update enemy single-nozzle trails
            entities.enemies.forEach(e => {
                if (!e.trailHistory) e.trailHistory = [];

                const isEnemyThrusting = (Math.hypot(e.vx, e.vy) > 0.3);
                const enemyBackX = e.x - Math.cos(e.angle) * (CONFIG.ENEMY_SIZE_H / 2);
                const enemyBackY = e.y - Math.sin(e.angle) * (CONFIG.ENEMY_SIZE_H / 2);

                e.trailHistory.push({ x: enemyBackX, y: enemyBackY, active: isEnemyThrusting });

                const maxEnemyTrailLen = 12; // Half length of player
                if (e.trailHistory.length > maxEnemyTrailLen) e.trailHistory.shift();
            });

            updateHUD();
        }

        function checkLevelUp() {
            if (playerStats.exp >= playerStats.nextLevelExp) {
                playerStats.level++;
                playerStats.exp -= playerStats.nextLevelExp;
                playerStats.nextLevelExp = Math.floor(playerStats.nextLevelExp * CONFIG.LEVEL_UP_EXP_MULT);

                GAME.state = 'PAUSED';

                const screen = document.getElementById('level-up-screen');
                const optionsContainer = document.getElementById('upgrade-options');
                optionsContainer.innerHTML = '';

                let available = [...upgradePool];
                for (let i = 0; i < 3 && available.length > 0; i++) {
                    const idx = Math.floor(Math.random() * available.length);
                    const upgrade = available.splice(idx, 1)[0];

                    const card = document.createElement('div');
                    card.className = 'upgrade-card';
                    card.innerHTML = `<h3>${upgrade.name}</h3><p>${upgrade.description}</p>`;
                    card.onclick = () => {
                        upgrade.apply();
                        screen.style.display = 'none';
                        GAME.state = 'PLAYING';
                    };
                    optionsContainer.appendChild(card);
                }
                screen.style.display = 'flex';
            }
        }

        function updateHUD() {
            document.getElementById('ui-level').innerText = playerStats.level;
            document.getElementById('ui-exp').innerText = playerStats.exp;
            document.getElementById('ui-next-exp').innerText = playerStats.nextLevelExp;
            document.getElementById('ui-hp').innerText = Math.floor(playerStats.hp);

            // 右下 Stats Panel 更新
            const shotsPerSec = (60 / playerStats.fireRate).toFixed(1);

            const statsHtml = `
                <div class="stat-category">
                    <div class="stat-category-title">// HULL</div>
                    <div class="stat-row"><span class="stat-label">INTEGRITY</span><span class="stat-level">Lv${playerStats.level}</span><span class="stat-value">${Math.floor(playerStats.hp)}/${playerStats.maxHp}</span></div>
                    <div class="stat-row"><span class="stat-label">PHY. RESIST</span><span class="stat-level">Lv1</span><span class="stat-value">100</span></div>
                    <div class="stat-row"><span class="stat-label">HEAT RESIST</span><span class="stat-level">Lv1</span><span class="stat-value">100</span></div>
                    <div class="stat-row"><span class="stat-label">EXP. RESIST</span><span class="stat-level">Lv1</span><span class="stat-value">100</span></div>
                    <div class="stat-row"><span class="stat-label">HEAT CAP.</span><span class="stat-level">Lv1</span><span class="stat-value">${CONFIG.HEAT_MAX}</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// VULCAN</div>
                    <div class="stat-row"><span class="stat-label">PROJECTILES</span><span class="stat-level">Lv${playerStats.upgrades.bulletCount}</span><span class="stat-value">${playerStats.bulletCount}</span></div>
                    <div class="stat-row"><span class="stat-label">FIRE RATE</span><span class="stat-level">Lv${playerStats.upgrades.fireRate}</span><span class="stat-value">${shotsPerSec}/s</span></div>
                    <div class="stat-row"><span class="stat-label">HEAT EFF.</span><span class="stat-level">Lv1</span><span class="stat-value">100</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// THRUSTER</div>
                    <div class="stat-row"><span class="stat-label">MAX SPEED</span><span class="stat-level">Lv${playerStats.upgrades.moveSpeed}</span><span class="stat-value">${(playerStats.maxSpeed).toFixed(1)}</span></div>
                    <div class="stat-row"><span class="stat-label">ACCEL</span><span class="stat-level">Lv${playerStats.upgrades.moveSpeed}</span><span class="stat-value">${(playerStats.moveSpeed).toFixed(2)}</span></div>
                    <div class="stat-row"><span class="stat-label">HANDLING</span><span class="stat-level">Lv${playerStats.upgrades.handling}</span><span class="stat-value">${(playerStats.handling * 60).toFixed(1)}°/s</span></div>
                    <div class="stat-row"><span class="stat-label">CTRL MODE</span><span class="stat-level">Lv-</span><span class="stat-value">${GAME.controlMode}</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// SHIELD SYS</div>
                    <div class="stat-row"><span class="stat-label">ENERGY</span><span class="stat-level">Lv1</span><span class="stat-value">100/100</span></div>
                    <div class="stat-row"><span class="stat-label">STRENGTH</span><span class="stat-level">Lv1</span><span class="stat-value">100</span></div>
                </div>
                <div class="stat-category">
                    <div class="stat-category-title">// ANCHOR GARAGE</div>
                    <div class="stat-row"><span class="stat-label">HULL INTEGRITY</span><span class="stat-level">Lv1</span><span class="stat-value">1000/1000</span></div>
                </div>
            `;
            document.getElementById('stats-panel').innerHTML = statsHtml;
        }

        // ==========================================
        // 5. 描画フェーズ (Rendering)
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = GAME.width;
        canvas.height = GAME.height;

        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, GAME.width, GAME.height);

            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = s.layer.rate;
                ctx.fillRect(s.x, s.y, s.layer.size, s.layer.size);
            });
            ctx.globalAlpha = 1.0;

            ctx.save();
            ctx.translate(GAME.width / 2 - player.x, GAME.height / 2 - player.y);

            // --- 母艦 (Anchor Garage) 描画 ---
            ctx.save();
            ctx.translate(CONFIG.MOTHERSHIP_X, CONFIG.MOTHERSHIP_Y);
            ctx.rotate(-Math.PI / 2); // 上向き

            // わずかな非対称性を持たせるため、片側にセンサーアンテナを追加
            ctx.strokeStyle = '#556677';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-50, 60);
            ctx.lineTo(-30, 100);
            ctx.lineTo(20, 100);
            ctx.stroke();
            // アンテナ先端の点滅
            ctx.fillStyle = Date.now() % 1000 < 500 ? '#f00' : '#556677';
            ctx.beginPath();
            ctx.arc(20, 100, 4, 0, Math.PI * 2);
            ctx.fill();

            // 外周構造 (防御・損傷状態の可視化領域)
            ctx.fillStyle = '#1a1f24';
            ctx.strokeStyle = '#334455';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-120, -70);
            ctx.lineTo(40, -70);
            ctx.lineTo(80, -40);
            ctx.lineTo(80, 40);
            ctx.lineTo(40, 70);
            ctx.lineTo(-120, 70);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 居住区の窓明かり（中に人がいる気配）
            ctx.fillStyle = '#ffffaa';
            ctx.globalAlpha = 0.8;
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(-100 + i * 25, -62, 8, 4);
                ctx.fillRect(-100 + i * 25, 58, 8, 4);
            }
            ctx.globalAlpha = 1.0;

            // 補助モジュール1 (上側)
            ctx.fillStyle = '#222d36';
            ctx.fillRect(-80, -90, 60, 20);
            ctx.strokeRect(-80, -90, 60, 20);
            // 補助モジュール2 (下側・少し形状を変えて非対称に)
            ctx.fillRect(-100, 70, 80, 25);
            ctx.strokeRect(-100, 70, 80, 25);

            // 中央コア (生命維持・システム中枢)
            ctx.fillStyle = '#0f141a';
            ctx.beginPath();
            ctx.arc(-20, 0, 45, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // コアの発光 (ゆっくりと脈動させる)
            const pulse = Math.sin(Date.now() / 1000) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(0, 255, 255, ${0.1 + pulse * 0.1})`;
            ctx.beginPath();
            ctx.arc(-20, 0, 35 + pulse * 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.arc(-20, 0, 15, 0, Math.PI * 2);
            ctx.fill();

            // 発着ドック (カタパルト) - 横幅を2.5倍に拡大
            const catW = 150;
            const catH = CONFIG.PLAYER_SIZE_W * 2.5; // 75
            ctx.fillStyle = '#111';
            ctx.fillRect(80, -catH / 2, catW, catH);
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 1;
            ctx.strokeRect(80, -catH / 2, catW, catH);

            // カタパルト上の誘導ライン (発光)
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(80, 0);
            ctx.lineTo(80 + catW, 0);
            ctx.stroke();
            ctx.setLineDash([]);

            // ドックのゲート発光
            ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
            ctx.fillRect(80, -catH / 2, 10, catH);

            // エンジン部 (後方)
            ctx.fillStyle = '#111';
            ctx.fillRect(-140, -30, 20, 60);
            // エンジン発光
            ctx.fillStyle = 'rgba(0, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.ellipse(-145, 0, 10, 25, 0, 0, Math.PI * 2);
            ctx.fill();

            // 機体名のペイント
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = 'bold 20px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.save();
            ctx.rotate(Math.PI / 2);
            ctx.fillText('A.GARAGE', 0, 90);
            ctx.restore();

            ctx.restore();

            // --- ランディングエリア表示（着艦中・発艦中・ターゲット中・クリア後は非表示）---
            if (!player.isLandingSequence && !GAME.launchSequence && !GAME.isMissionClear && entities.enemies.length === 0) {
                const lcat = getCatapultSpec();
                const landingColor = 'rgba(0, 220, 100, 0.18)';
                const landingStroke = 'rgba(0, 220, 100, 0.55)';
                ctx.save();
                ctx.beginPath();
                ctx.arc(lcat.tipX, lcat.tipY, 50, 0, Math.PI * 2);
                ctx.fillStyle = landingColor;
                ctx.fill();
                ctx.strokeStyle = landingStroke;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = landingStroke;
                ctx.font = 'bold 11px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('LANDING AREA', lcat.tipX, lcat.tipY - 54);
                ctx.restore();
            }

            // --- 補給中のステータス表示 ---
            if (player.isLandingSequence && player.landingPhase === 'RESUPPLY' && player.needsResupplyVisual) {
                ctx.save();
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 14px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('REPAIRING & RESUPPLYING...', player.x, player.y - 40);
                // ゲージの簡易表示
                ctx.strokeStyle = '#0ff';
                ctx.strokeRect(player.x - 50, player.y - 30, 100, 6);
                const progress = (120 - player.landingTimer) / 120;
                ctx.fillRect(player.x - 50, player.y - 30, 100 * progress, 6);
                ctx.restore();
            }

            entities.gems.forEach(g => {
                let sprite = SpriteCache.gem;
                if (g.kind === 'HEAL') sprite = SpriteCache.gemHeal;
                if (g.kind === 'BIG_EXP') sprite = SpriteCache.gemBigExp;
                const drawSize = sprite.width;
                ctx.drawImage(sprite, g.x - drawSize / 2, g.y - drawSize / 2);
            });

            entities.particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                if (p.type === 'DEBRIS_SMOKE') {
                    // 半透明の煙（灰色の●で表現、拡大しながら薄れて消える）
                    const progress = 1.0 - (p.life / p.maxLife); // 0.0 〜 1.0
                    const scale = 1.0 + progress * 1.0; // 1倍から2倍へ拡大
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = '#888'; // 灰色
                    ctx.beginPath();
                    ctx.arc(0, 0, p.baseSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'ENEMY_THRUSTER') {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.drawImage(SpriteCache.particleEnemy, -SpriteCache.particleEnemy.width / 2, -SpriteCache.particleEnemy.height / 2);
                } else {
                    ctx.globalAlpha = Math.max(0, p.life);
                    const scale = Math.max(0.1, p.life);
                    ctx.scale(scale, scale);
                    ctx.drawImage(SpriteCache.particlePlayer, -SpriteCache.particlePlayer.width / 2, -SpriteCache.particlePlayer.height / 2);
                }
                ctx.restore();
            });
            ctx.globalAlpha = 1.0;

            // デブリ（破片）の描画（最後の30%でフェードアウト）
            entities.debris.forEach(d => {
                ctx.fillStyle = d.color;
                ctx.globalAlpha = Math.min(1.0, d.life / 0.3);
                ctx.fillRect(d.x - d.size / 2, d.y - d.size / 2, d.size, d.size);
            });
            ctx.globalAlpha = 1.0;

            // 敵の弾描画 (細い赤い楕円形＋白いコアのSF風レーザー)
            entities.enemyBullets.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                const angle = Math.atan2(b.vy, b.vx);
                ctx.rotate(angle);

                // 外側の赤い発光
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 2.8, CONFIG.BULLET_SIZE * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // 内側の白いコア
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 1.8, CONFIG.BULLET_SIZE * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });

            // 自機の弾描画 (細い黄色の楕円形＋白いコアのSF風レーザー)
            entities.bullets.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                const angle = Math.atan2(b.vy, b.vx);
                ctx.rotate(angle);

                // 外側の黄色の発光
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 2.8, CONFIG.BULLET_SIZE * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // 内側の白いコア
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(0, 0, CONFIG.BULLET_SIZE * 1.8, CONFIG.BULLET_SIZE * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });

            // --- スラスター軌跡（リボン・トレイル）の描画 ---
            function drawRibbonTrail(history, colorBase, maxLen) {
                if (!history || history.length < 2) return;

                for (let i = 1; i < history.length; i++) {
                    const ptPrev = history[i - 1];
                    const ptCurr = history[i];
                    const t = i / history.length;

                    // ブースト時は太さ2倍（衝撃波エネルギーパルス効果）
                    const currentMaxLen = ptCurr.boost ? maxLen * 2.0 : maxLen;
                    const thickness = currentMaxLen * Math.pow(t, 1.5);
                    const opacity = ptCurr.active ? Math.pow(t, 0.7) : Math.pow(t, 0.7) * 0.35;

                    if (thickness <= 0.1 || opacity <= 0.01) continue;

                    ctx.save();
                    ctx.globalAlpha = opacity;

                    // 外周の発光ライン
                    ctx.beginPath();
                    ctx.strokeStyle = colorBase;
                    ctx.lineWidth = thickness;
                    ctx.lineCap = 'round';
                    ctx.moveTo(ptPrev.x, ptPrev.y);
                    ctx.lineTo(ptCurr.x, ptCurr.y);
                    ctx.stroke();

                    // 内側の高輝度コアライン（白）
                    ctx.beginPath();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = thickness * 0.35;
                    ctx.lineCap = 'round';
                    ctx.moveTo(ptPrev.x, ptPrev.y);
                    ctx.lineTo(ptCurr.x, ptCurr.y);
                    ctx.stroke();

                    ctx.restore();
                }
                ctx.globalAlpha = 1.0;
            }

            // 自機の２本スラスター描画
            if (!GAME.isPlayerDying) {
                drawRibbonTrail(player.leftTrailHistory, '#00d2ff', 7);  // トムキャット風のツインバーニア（シアンブルー）
                drawRibbonTrail(player.rightTrailHistory, '#00d2ff', 7); // トムキャット風のツインバーニア（シアンブルー）
            }

            // 敵機の１本スラスター描画
            entities.enemies.forEach(e => {
                let color = CONFIG.COLOR_ENEMY_DOGFIGHTER;
                if (e.personality === 'RAMMER') color = CONFIG.COLOR_ENEMY_RAMMER;
                if (e.personality === 'SNIPER') color = CONFIG.COLOR_ENEMY_SNIPER;
                drawRibbonTrail(e.trailHistory, color, 5); // 太さはやや細め、長さも半分
            });

            // 敵機描画
            entities.enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);

                // 敵のHPゲージ・ヒートゲージ (機体の下に回転せず描画)
                const barW = 30;
                // 上段：HPゲージ
                const hpRatio = Math.max(0, e.hp / e.maxHp);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(-barW / 2, 22, barW, 3);
                ctx.fillStyle = hpRatio <= 0.2 ? '#f00' : '#0f0';
                ctx.fillRect(-barW / 2, 22, barW * hpRatio, 3);

                // 下段：ヒートゲージ
                if (e.heat > 0) {
                    const heatRatio = Math.max(0, Math.min(1, e.heat / CONFIG.HEAT_MAX));
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(-barW / 2, 26, barW, 3);
                    if (e.isOverheated) {
                        ctx.fillStyle = '#808080';
                    } else if (heatRatio > 0.8) {
                        ctx.fillStyle = '#f80';
                    } else {
                        ctx.fillStyle = '#fff';
                    }
                    ctx.fillRect(-barW / 2, 26, barW * heatRatio, 3);
                }

                ctx.rotate(e.angle);

                // 性格に応じたプリレンダースプライトを選択
                let sprite = SpriteCache.enemyDogfighter;
                if (e.personality === 'RAMMER') sprite = SpriteCache.enemyRammer;
                if (e.personality === 'SNIPER') sprite = SpriteCache.enemySniper;

                ctx.drawImage(sprite, -sprite.width / 2, -sprite.height / 2);

                // 攻撃ヒット時の白フラッシュ
                if (e.flashTimer > 0) {
                    ctx.globalAlpha = e.flashTimer / CONFIG.FLASH_DURATION;
                    ctx.drawImage(SpriteCache.enemyFlash, -SpriteCache.enemyFlash.width / 2, -SpriteCache.enemyFlash.height / 2);
                    ctx.globalAlpha = 1.0;
                }
                ctx.restore();
            });

            // 自機描画とマイクロHUD (生存時のみ)
            if (!GAME.isPlayerDying) {
                // 砲塔描画 (機体より先に描画して下に隠れるようにする)
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.turretAngle);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, -3, CONFIG.PLAYER_SIZE_W / 2 + 10, 6);
                ctx.restore();

                // 自機描画 (土台)
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.bodyAngle);
                ctx.drawImage(SpriteCache.player, -SpriteCache.player.width / 2, -SpriteCache.player.height / 2);
                ctx.restore();

                // ----------------------------------------
                // 自機追従マイクロHUDの描画 (Z-order最前面扱い - 発進シーケンス中以外のみ)
                // ----------------------------------------
                if (!GAME.launchSequence) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.lineWidth = 4;

                    // --- 右側：HPゲージ (内側 半径39、2時〜4時) ---
                    const hpRadius = 39;
                    ctx.beginPath();
                    ctx.arc(0, 0, hpRadius, -Math.PI / 6, Math.PI / 6); // 背景 (2時〜4時)
                    ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)';
                    ctx.stroke();

                    const hpRatio = Math.max(0, playerStats.hp / playerStats.maxHp);
                    if (hpRatio > 0) {
                        ctx.beginPath();
                        const startAngle = -Math.PI / 6;
                        const endAngle = startAngle + (Math.PI / 3) * hpRatio;
                        ctx.arc(0, 0, hpRadius, startAngle, endAngle, false);
                        ctx.strokeStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
                        ctx.stroke();
                    }

                    // --- 右側：ヒートゲージ (外側 半径45、2時〜4時) ---
                    const heatRadius = 45;
                    ctx.beginPath();
                    ctx.arc(0, 0, heatRadius, -Math.PI / 6, Math.PI / 6); // 背景 (2時〜4時)
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.stroke();

                    const heatRatio = Math.max(0, Math.min(1, playerStats.heat / CONFIG.HEAT_MAX));
                    if (heatRatio > 0) {
                        ctx.beginPath();
                        const startAngle = -Math.PI / 6;
                        const endAngle = startAngle + (Math.PI / 3) * heatRatio;
                        ctx.arc(0, 0, heatRadius, startAngle, endAngle, false);
                        if (player.isOverheated) {
                            ctx.strokeStyle = '#808080';
                        } else if (heatRatio > 0.8) {
                            ctx.strokeStyle = '#f80';
                        } else {
                            ctx.strokeStyle = '#fff';
                        }
                        ctx.stroke();
                    }

                    // --- 左側：EXPゲージ (内側 半径39、10時〜8時) ---
                    const expRadius = 39;
                    ctx.beginPath();
                    // 10時は 5PI/6 (150度), 8時は 7PI/6 (210度) => -5PI/6 (210度) to -7PI/6? 
                    // 12= -90, 9= 180 (PI), 10= 210, 8= 150.
                    // 210 to 150 (counter clockwise) or 150 to 210 (clockwise).
                    ctx.arc(0, 0, expRadius, 5 * Math.PI / 6, 7 * Math.PI / 6); // 背景
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.stroke();

                    const expRatio = Math.max(0, Math.min(1, playerStats.exp / playerStats.nextLevelExp));
                    if (expRatio > 0) {
                        ctx.beginPath();
                        const startAngle = 7 * Math.PI / 6; // 8時から
                        const endAngle = startAngle - (Math.PI / 3) * expRatio; // 10時へ向かって
                        ctx.arc(0, 0, expRadius, startAngle, endAngle, true);
                        ctx.strokeStyle = '#0ff';
                        ctx.stroke();
                    }

                    ctx.restore();
                } // GAME.launchSequence wrapper end
            }

            // 爆発の描画 (3つの重ね合わせたサークルで拡大→維持＋振動→縮小)
            entities.explosions.forEach(exp => {
                const scale = exp.currentScale;
                const currentRadius = exp.maxRadius * scale;

                ctx.save();

                // 最後の10%でフェードアウト
                const progress = 1 - (exp.timer / exp.maxTimer);
                if (progress > 0.9) {
                    ctx.globalAlpha = Math.max(0, (1.0 - progress) / 0.1);
                } else {
                    ctx.globalAlpha = 1.0;
                }

                // 振動オフセットを適用
                const drawX = exp.x + (exp.shakeX || 0);
                const drawY = exp.y + (exp.shakeY || 0);

                // 円1 (赤/深紅 - やや大きめ、少しズレ)
                ctx.beginPath();
                ctx.arc(drawX - 4 * scale, drawY - 3 * scale, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 30, 0, 0.7)';
                ctx.fill();

                // 円2 (白 - 少し小さめ、ズレ)
                ctx.beginPath();
                ctx.arc(drawX + 3 * scale, drawY + 3 * scale, currentRadius * 0.75, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();

                // 円3 (黄色/オレンジ - 反対方向にズレ)
                ctx.beginPath();
                ctx.arc(drawX - 2 * scale, drawY + 5 * scale, currentRadius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 160, 0, 0.8)';
                ctx.fill();

                ctx.restore();
            });

            ctx.restore(); // カメラ適用終了

            // ----------------------------------------
            // プレイヤー中心レーダーと敵方向マーカー描画
            // ----------------------------------------
            if (!GAME.isPlayerDying && !GAME.launchSequence && !player.isLandingSequence) {
                ctx.save();
                ctx.translate(GAME.width / 2, GAME.height / 2);

                // レーダーゲージ（真円）
                const radarRadius = CONFIG.RADAR_RADIUS;
                ctx.strokeStyle = 'rgba(255, 0, 0, 1.0)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, radarRadius, 0, Math.PI * 2);
                ctx.stroke();

                // ヒゲ（東西南北＋斜め45度）
                for (let i = 0; i < 8; i++) {
                    const a = (Math.PI / 4) * i;
                    const cosA = Math.cos(a);
                    const sinA = Math.sin(a);
                    ctx.beginPath();
                    // 5px外側に飛び出すヒゲ
                    ctx.moveTo(cosA * radarRadius, sinA * radarRadius);
                    ctx.lineTo(cosA * (radarRadius + 5), sinA * (radarRadius + 5));
                    ctx.stroke();
                }

                // 砲塔方向を示す TARGET マーカー（▲とTARGETの文字）
                ctx.save();
                ctx.rotate(player.turretAngle);
                ctx.fillStyle = '#0f0'; // 自機と同じ色(緑)
                // ▲アイコンをレーダー内側に表示 (サイズ拡大)
                ctx.beginPath();
                ctx.moveTo(radarRadius - 15, 0); // 先端 (外側へ)
                ctx.lineTo(radarRadius - 35, -8); // 後ろ上 (幅を広げ、後ろに引く)
                ctx.lineTo(radarRadius - 35, 8);  // 後ろ下
                ctx.closePath();
                ctx.fill();

                // TARGET文字 (重なり防止のため、底辺からさらに内側へ離す)
                ctx.font = 'bold 10px Courier New';
                ctx.fillStyle = '#0f0'; // 文字も自機色(緑)に
                ctx.textAlign = 'center';

                // 底辺の中心 (radarRadius - 35, 0) からさらに離し、(radarRadius - 45, 0) に翻訳
                ctx.translate(radarRadius - 45, 0);

                let textAngle = player.turretAngle;
                while (textAngle < 0) textAngle += Math.PI * 2;
                textAngle = textAngle % (Math.PI * 2);

                // 画面下半分の角度では文字が裏返らないように180度反転
                // 重なりを防ぐため、常にレーダーの中心寄りに押し出すよう textBaseline を出し分け
                if (textAngle > Math.PI / 2 && textAngle < Math.PI * 1.5) {
                    ctx.rotate(-Math.PI / 2);
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('TARGET', 0, -2);
                } else {
                    ctx.rotate(Math.PI / 2);
                    ctx.textBaseline = 'top';
                    ctx.fillText('TARGET', 0, 2);
                }
                ctx.restore();

                // --- 母艦（Anchor Garage）への方向マーカー ---
                const msDx = CONFIG.MOTHERSHIP_X - player.x;
                const msDy = CONFIG.MOTHERSHIP_Y - player.y;
                const msAngle = Math.atan2(msDy, msDx);
                const msDist = Math.hypot(msDx, msDy);

                // 母艦が画面内に十分入っているか判定（表示内ならレーダーを非表示にする）
                // 画面端からのマージンを考慮して判定（画面外へ少し出たらすぐレーダーがガイドするよう +200 程度余裕を持たせる）
                const isMsVisible = Math.abs(msDx) <= GAME.width / 2 + 200 && Math.abs(msDy) <= GAME.height / 2 + 200;

                if (!isMsVisible) {
                    // 距離のフォーマット (1~999m、1.0km～で表記切り替え)
                    const msDistRounded = Math.floor(msDist);
                    let msDistStr = "";
                    if (msDistRounded >= 1000) {
                        msDistStr = (msDist / 1000).toFixed(1) + "km";
                    } else {
                        msDistStr = Math.max(1, msDistRounded) + "m";
                    }

                    ctx.save();
                    ctx.rotate(msAngle);
                    ctx.fillStyle = '#fff'; // 母艦のレーダーアイコンは白にする

                    // ▲アイコンをレーダー内側に表示 (TARGETと同じサイズに拡大)
                    ctx.beginPath();
                    ctx.moveTo(radarRadius - 15, 0); // 先端
                    ctx.lineTo(radarRadius - 35, -8); // 後ろ上
                    ctx.lineTo(radarRadius - 35, 8);  // 後ろ下
                    ctx.closePath();
                    ctx.fill();

                    // 三角の下側（レーダーの中心側）に A.GARAGE と距離を表示 (白にする)
                    // テキストも三角の回転に合わせて一緒に回転する
                    ctx.fillStyle = '#fff'; // テキスト・距離も白
                    ctx.textAlign = 'center';

                    // 底辺の中心から十分離し、(radarRadius - 45, 0) に翻訳
                    ctx.translate(radarRadius - 45, 0);

                    let msTextAngle = msAngle;
                    while (msTextAngle < 0) msTextAngle += Math.PI * 2;
                    msTextAngle = msTextAngle % (Math.PI * 2);

                    // 画面下半分の角度では文字が裏返らないように180度反転
                    // 重なりを防ぐため、常にレーダーの中心寄りに押し出すよう textBaseline とテキスト位置を調整
                    if (msTextAngle > Math.PI / 2 && msTextAngle < Math.PI * 1.5) {
                        ctx.rotate(-Math.PI / 2);
                        ctx.textBaseline = 'bottom';
                        ctx.font = 'bold 10px Courier New';
                        ctx.fillText('A.GARAGE', 0, -18);
                        ctx.font = 'bold 16px Courier New';
                        ctx.fillText(msDistStr, 0, -2);
                    } else {
                        ctx.rotate(Math.PI / 2);
                        ctx.textBaseline = 'top';
                        ctx.font = 'bold 10px Courier New';
                        ctx.fillText('A.GARAGE', 0, 18);
                        ctx.font = 'bold 16px Courier New';
                        ctx.fillText(msDistStr, 0, 2);
                    }
                    ctx.restore();
                }

                // 画面外エネミーの方向マーカーと距離表示
                entities.enemies.forEach(e => {
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.hypot(dx, dy);
                    const halfW = GAME.width / 2;
                    const halfH = GAME.height / 2;

                    // 画面外にいる敵のみ表示
                    if (Math.abs(dx) > halfW || Math.abs(dy) > halfH) {
                        const angle = Math.atan2(dy, dx);

                        ctx.save();
                        // 真円のすぐ外側（半径 + 15pxの位置）にマーカーを配置
                        const markerX = Math.cos(angle) * (radarRadius + 15);
                        const markerY = Math.sin(angle) * (radarRadius + 15);
                        ctx.translate(markerX, markerY);

                        // マーカー本体の描画（回転させる）
                        ctx.save();
                        ctx.rotate(angle + Math.PI / 2); // ▲の頂点が敵の方向を向くように回転

                        ctx.fillStyle = 'rgba(255, 50, 50, 0.8)';
                        ctx.strokeStyle = 'rgba(255, 50, 50, 0.8)';

                        // 赤い▲
                        ctx.beginPath();
                        ctx.moveTo(0, -8);  // 少し小ぶりに調整
                        ctx.lineTo(-6, 4);
                        ctx.lineTo(6, 4);
                        ctx.closePath();
                        ctx.fill();

                        // 下部の線（天地を示す ＿）
                        ctx.beginPath();
                        ctx.moveTo(-8, 6);
                        ctx.lineTo(8, 6);
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.restore(); // マーカーの回転リセット

                        // 距離テキストの描画（回転させず水平を保つ）
                        let distText = "";
                        if (dist >= 999) {
                            distText = (dist / 1000).toFixed(1) + "km";
                        } else {
                            distText = Math.floor(dist) + "m";
                        }

                        // テキスト位置をさらに外側へ押し出す
                        const textOffset = 18;
                        const textX = Math.cos(angle) * textOffset;
                        const textY = Math.sin(angle) * textOffset;

                        ctx.fillStyle = 'rgba(255, 50, 50, 0.9)';
                        ctx.font = 'bold 12px Courier New';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(distText, textX, textY);

                        ctx.restore(); // 位置リセット
                    }
                });

                // --- 現在の座標表示（レーダーの下）---
                ctx.save();
                ctx.translate(0, radarRadius + 25);
                ctx.font = 'bold 12px Courier New';
                ctx.fillStyle = 'rgba(0, 255, 0, 0.8)'; // 緑色
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const formatCoord = (v) => {
                    const sign = v < 0 ? '-' : '+';
                    return sign + Math.abs(Math.round(v)).toString().padStart(5, '0');
                };
                const coordText = `- ${formatCoord(player.x)}.${formatCoord(player.y)} -`;
                ctx.fillText(coordText, 0, 0);

                const speedKms = ((Math.hypot(player.vx, player.vy) * 60) / 1000).toFixed(1);
                ctx.font = 'bold 14px Courier New';
                ctx.fillStyle = 'rgba(0, 255, 255, 0.9)';
                ctx.fillText(`${speedKms}km/s`, 0, 18);
                ctx.restore();

                ctx.restore();
            }

            // ----------------------------------------
            // 被弾時の画面全体赤フラッシュ演出
            // ----------------------------------------
            if (GAME.damageFlashTimer > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${(GAME.damageFlashTimer / CONFIG.FLASH_DURATION) * 0.4})`;
                ctx.fillRect(0, 0, GAME.width, GAME.height);
                GAME.damageFlashTimer--;
            }
        }

        // ==========================================
        // 6. メインループ
        // ==========================================
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 初期化して開始
        SpriteCache.init();
        Cielo.init();
        loop();

    </script>
</body>
